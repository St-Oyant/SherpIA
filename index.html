<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2151">
<title>SherpIA 🦙</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#12142e; --bg2:#1a2151; --card:#222653; --card2:#2b3066;
  --accent:#9c7bff; --accent2:#7c4dff; --cyan:#4dd0e1;
  --txt:#eceafe; --muted:#a5a3c8; --ok:#4caf7d; --ko:#e05c6e;
  --gold:#ffca55; --lock:#5b5e86;
  --grad:linear-gradient(160deg,#1a2151 0%,#4527a0 55%,#7b1fa2 100%);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:17px;line-height:1.45;}
body{min-height:100vh;overscroll-behavior-y:contain;}
#app{max-width:560px;margin:0 auto;padding:0 14px calc(30px + env(safe-area-inset-bottom));}
h1,h2,h3{line-height:1.25;}
button{font-family:inherit;}
.hdr{background:var(--grad);margin:0 -14px;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
  border-radius:0 0 22px 22px;box-shadow:0 4px 18px rgba(0,0,0,.35);}
.hdr-row{display:flex;align-items:center;gap:12px;}
.hdr .lama{font-size:38px;}
.hdr .t{flex:1;}
.hdr .t b{font-size:22px;letter-spacing:.5px;}
.hdr .t small{display:block;color:#d5ccf5;font-size:12.5px;}
.pill{background:rgba(255,255,255,.16);border-radius:999px;padding:5px 12px;font-size:13.5px;
  font-weight:600;white-space:nowrap;}
.hdr-stats{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.hdr-stats .pill{cursor:pointer;border:none;color:var(--txt);}
.bar{height:7px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden;margin-top:10px;}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:99px;transition:width .5s;}
.section-t{margin:22px 2px 10px;font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;}
.card{background:var(--card);border-radius:16px;padding:15px 16px;margin-bottom:11px;
  border:1px solid rgba(255,255,255,.06);box-shadow:0 2px 8px rgba(0,0,0,.22);}
.chap{display:flex;gap:13px;align-items:center;cursor:pointer;transition:transform .12s;}
.chap:active{transform:scale(.98);}
.chap .ic{font-size:30px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;
  background:var(--card2);border-radius:14px;flex-shrink:0;}
.chap .inf{flex:1;min-width:0;}
.chap .inf b{display:block;font-size:16.5px;}
.chap .inf small{color:var(--muted);font-size:13px;display:block;margin-top:2px;}
.chap.soon{opacity:.55;cursor:default;}
.chap .minibar{height:5px;background:#383d74;border-radius:99px;margin-top:7px;overflow:hidden;}
.chap .minibar i{display:block;height:100%;background:var(--accent);border-radius:99px;}
.chev{font-size:24px;color:var(--accent);flex-shrink:0;line-height:1;font-weight:400;}
.chev.done{color:var(--ok);font-size:15px;font-weight:800;letter-spacing:1px;}
.lock-ic{font-size:16px;flex-shrink:0;opacity:.6;}
.chap{cursor:pointer;}
.card.lesson[data-play],.card.lesson[data-tp]{cursor:pointer;}
.card.lesson[data-play]:active,.card.lesson[data-tp]:active,.chap:not(.soon):active{transform:scale(.98);}
.lesson{display:flex;gap:12px;align-items:center;transition:transform .12s;}
.lesson .num{width:38px;height:38px;border-radius:12px;background:var(--card2);display:flex;
  align-items:center;justify-content:center;font-weight:800;color:var(--accent);flex-shrink:0;font-size:14.5px;}
.lesson.locked .num{color:var(--lock);}
.lesson.locked{opacity:.55;}
.lesson .inf{flex:1;min-width:0;}
.lesson .inf b{font-size:15.5px;display:block;}
.lesson .stars{color:var(--gold);font-size:13.5px;letter-spacing:1px;}
.lesson .info-btn{background:none;border:1.5px solid rgba(165,163,200,.45);color:var(--muted);width:26px;height:26px;
  border-radius:99px;font-size:13px;font-weight:700;font-style:italic;font-family:Georgia,"Times New Roman",serif;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.lesson .info-btn:active{border-color:var(--cyan);color:var(--cyan);}
.btn{display:block;width:100%;background:linear-gradient(120deg,var(--accent2),#9430c9);color:#fff;
  border:none;border-radius:14px;padding:15px;font-size:16.5px;font-weight:700;cursor:pointer;
  margin-top:14px;box-shadow:0 4px 14px rgba(124,77,255,.35);transition:transform .1s;}
.btn:active{transform:scale(.97);}
.btn.sec{background:var(--card2);box-shadow:none;color:var(--txt);}
.btn.ghost{background:none;border:1.5px solid var(--card2);box-shadow:none;color:var(--muted);}
.btn:disabled{opacity:.45;}
.back{background:none;border:none;color:var(--muted);font-size:15px;padding:14px 2px 4px;cursor:pointer;}
/* Fiches */
.fiche-wrap{position:relative;overflow:hidden;margin-top:8px;touch-action:pan-y;}
.fiche{background:var(--card);border-radius:18px;padding:20px;border:1px solid rgba(255,255,255,.07);
  min-height:290px;display:flex;flex-direction:column;justify-content:flex-start;}
.fiche h3{margin:0 0 10px;color:var(--accent);font-size:17.5px;}
.fiche p{margin:0 0 10px;font-size:16px;}
.fiche .encart{background:rgba(77,208,225,.09);border-left:3px solid var(--cyan);border-radius:0 12px 12px 0;
  padding:11px 13px;font-size:14.5px;margin-top:6px;}
.fiche .encart b{color:var(--cyan);}
.fiche ul{margin:4px 0;padding-left:20px;font-size:15.5px;}
.fiche li{margin-bottom:7px;}
.dots{display:flex;gap:7px;justify-content:center;margin:14px 0 4px;}
.dots i{width:8px;height:8px;border-radius:99px;background:#3b3f77;transition:background .2s;}
.dots i.on{background:var(--accent);}
/* Quiz */
.qhead{display:flex;justify-content:space-between;align-items:center;color:var(--muted);
  font-size:13.5px;margin:14px 2px 8px;font-weight:600;}
.qtype{color:var(--cyan);}
.quiz-frame{margin-top:2px;background:var(--card2);border-radius:20px;padding:16px;
  border:1px solid rgba(255,255,255,.07);}
.qtext{font-size:16.5px;font-weight:600;padding:2px 4px 14px;color:var(--txt);}
.opts-card{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--card);color:var(--txt);
  border:1.5px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 15px;font-size:15.5px;font-weight:400;
  cursor:pointer;transition:background-color .15s,border-color .15s;}
.opt:active{border-color:var(--accent);background:rgba(255,255,255,.04);}
.opt.ok{border-color:var(--ok);background:rgba(76,175,125,.16);color:#eafff1;}
.opt.ko{border-color:var(--ko);background:rgba(224,92,110,.15);}
.opt.dim{opacity:.45;}
.opt .vf-ico{font-size:16px;flex-shrink:0;}
.fb{border-radius:14px;padding:13px 15px;font-size:14.5px;margin-top:4px;animation:pop .25s;}
.fb.good{background:rgba(76,175,125,.13);border:1px solid rgba(76,175,125,.4);}
.fb.bad{background:rgba(224,92,110,.12);border:1px solid rgba(224,92,110,.4);}
.fb b{display:block;margin-bottom:4px;}
@keyframes pop{from{transform:translateY(8px);opacity:0;}to{transform:none;opacity:1;}}
/* Résultats */
.result{text-align:center;padding:26px 0 6px;}
.result .big{font-size:64px;}
.result h2{margin:8px 0 4px;}
.result .stars{font-size:34px;letter-spacing:4px;color:var(--gold);margin:6px 0;}
.result .xp{color:var(--cyan);font-weight:700;font-size:18px;}
/* Frise niveaux */
.rank-item{display:flex;gap:14px;align-items:flex-start;position:relative;padding:0 0 26px 8px;}
.rank-item:before{content:"";position:absolute;left:29px;top:46px;bottom:0;width:3px;background:var(--card2);}
.rank-item:last-child:before{display:none;}
.rank-item .re{width:46px;height:46px;border-radius:99px;background:var(--card2);display:flex;
  align-items:center;justify-content:center;font-size:22px;flex-shrink:0;z-index:1;}
.rank-item.here .re{background:var(--grad);box-shadow:0 0 0 3px var(--accent);}
.rank-item.locked{opacity:.5;}
.rank-item .ri b{display:block;font-size:16px;}
.rank-item .ri small{color:var(--muted);font-size:13.5px;display:block;}
.rank-item .here-tag{color:var(--gold);font-weight:800;font-size:12.5px;}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,9,24,.75);display:flex;align-items:flex-end;
  justify-content:center;z-index:50;animation:fade .2s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--bg2);border-radius:22px 22px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom));
  width:100%;max-width:560px;max-height:82vh;overflow-y:auto;}
.modal h3{margin:0 0 8px;}
.modal textarea{width:100%;background:var(--bg);color:var(--cyan);border:1px solid var(--card2);
  border-radius:12px;padding:11px;font-size:12.5px;font-family:monospace;min-height:86px;resize:none;}
.modal .muted{color:var(--muted);font-size:14px;}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--card2);color:var(--txt);padding:11px 20px;border-radius:99px;font-size:14.5px;
  z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:pop .25s;white-space:nowrap;}
.obj-list{margin:8px 0;padding-left:4px;list-style:none;font-size:15px;}
.obj-list li{margin-bottom:7px;padding-left:26px;position:relative;}
.obj-list li:before{content:"🎯";position:absolute;left:0;font-size:14px;}
.tp-step{color:var(--muted);font-size:13.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:16px 2px 8px;}
.post-draft{background:rgba(255,202,85,.08);border:1px solid rgba(255,202,85,.35);border-radius:16px;
  padding:16px;font-size:14.5px;margin-top:14px;}
.post-draft h4{margin:0 0 8px;color:var(--gold);}
.hint-export{background:rgba(77,208,225,.09);border:1px solid rgba(77,208,225,.3);border-radius:14px;
  padding:12px 14px;font-size:14px;margin-top:14px;}
</style>
</head>

function shuffle(arr){ /* Fisher-Yates — LE mélange unique de l'app (leçon Cortex §4) */
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function el(html){const d=document.createElement("div");d.innerHTML=html;return d.firstElementChild;}

 {id:"ch1",num:1,e:"🌱",title:"La machine qui apprend",soon:false,teaser:"ML : les 3 façons d'apprendre, la donnée-carburant, entraînement vs inférence.",lessons:[

   resume:["Programme classique = règles écrites par un humain ; machine learning = règles apprises à partir d'exemples.","Le ML s'impose quand les règles sont impossibles à écrire mais que les exemples abondent.","Règles connues et stables → le programme classique reste le meilleur choix (coût, prévisibilité, auditabilité).","Savoir dire « pas d'IA ici » est un marqueur de crédibilité, pas un aveu de faiblesse."],

    {ty:"🎯 Scénario métier",q:"Une entreprise veut calculer automatiquement des frais de douane à partir du barème officiel publié chaque année. Ta recommandation :",opts:[{t:"Un programme classique : les règles sont connues, publiées et stables",ok:true},{t:"Un modèle de machine learning entraîné sur les anciens calculs"},{t:"Un LLM qui estimera les frais"},{t:"Attendre une IA spécialisée douane"}],fb:"Le barème EST la règle : il suffit de la coder. Un modèle ML introduirait de l'à-peu-près dans un calcul qui doit être exact et auditable. Premier réflexe de conseil : l'IA n'est pas la réponse par défaut."},

    {ty:"🐛 Repère l'erreur",q:"Une plaquette commerciale : « Notre IA détecte tous les défauts car nos experts ont saisi dans le logiciel toutes les formes de défauts possibles. » Le problème ?",opts:[{t:"Si on peut énumérer toutes les formes à la main, c'est un programme classique — et en vision, personne ne le peut : le ML apprend des exemples, pas de règles saisies",ok:true},{t:"Rien, c'est comme ça que fonctionne le deep learning"},{t:"Le problème est que les experts n'étaient pas assez nombreux"},{t:"Il aurait fallu saisir aussi les pièces sans défaut"}],fb:"La phrase mélange les deux paradigmes : « saisir toutes les formes possibles » est exactement ce que le ML évite d'avoir à faire. Une plaquette qui confond les deux en dit long sur le fournisseur."},
    {ty:"🔍 Analyse",q:"Ton filtre anti-spam s'améliore quand les utilisateurs marquent des messages comme indésirables. Pourquoi est-ce typiquement du machine learning ?",opts:[{t:"Chaque marquage est un exemple étiqueté dont le système apprend — les règles évoluent avec les exemples",ok:true},{t:"Parce qu'un développeur ajoute une règle à chaque marquage"},{t:"Parce que le spam est stocké dans une base de données"},{t:"Ce n'est pas du machine learning, c'est un simple tri"}],fb:"Personne n'écrit « bloquer les messages contenant X » à chaque clic : les marquages nourrissent l'apprentissage. Le spam évolue sans cesse — cas d'école où des règles écrites seraient obsolètes en une semaine."}]},

   quiz:[

    {ty:"🎯 Scénario métier",q:"Un e-commerçant veut découvrir des profils de comportement d'achat dans ses données, sans catégories prédéfinies. Quelle famille ?",opts:[{t:"Non supervisé : on cherche des groupes que personne n'a définis à l'avance",ok:true},{t:"Supervisé : il suffit d'étiqueter les clients"},{t:"Renforcement : on récompense les bons clients"},{t:"Aucune : c'est impossible sans catégories"}],fb:"« Sans catégories prédéfinies » = pas d'étiquettes possibles = non supervisé. Le clustering révèle des segments qu'on baptisera après coup — l'inverse du supervisé qui reproduit des catégories connues."},
    {ty:"Vrai/Faux",vf:true,q:"« L'apprentissage par renforcement consiste à entraîner un modèle sur des exemples étiquetés par des humains. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"Le renforcement apprend par essai-erreur et récompense, pas par corrigé fourni. Personne n'étiquette « ce mouvement de robot était bon » : la chute ou la réussite fait office de note."},
    {ty:"Texte à trou",q:"Des données accompagnées de leur bonne réponse sont des données ___.",opts:[{t:"étiquetées",ok:true},{t:"compressées"},{t:"anonymisées"},{t:"structurées"}],fb:"L'étiquette (label) est le corrigé attaché à l'exemple. « Données étiquetées » est LE terme qui déclenche la discussion budget dans un projet supervisé."},
    {ty:"🔍 Analyse",q:"Un robot apprend à marcher en tombant des dizaines de milliers de fois en simulation, jusqu'à tenir debout. Quelle famille d'apprentissage ?",opts:[{t:"Renforcement : chaque essai est noté par le résultat, la stratégie s'affine",ok:true},{t:"Supervisé : les chutes sont des étiquettes"},{t:"Non supervisé : le robot groupe ses chutes"},{t:"Ce n'est pas de l'apprentissage"}],fb:"Essai → résultat → ajustement, en boucle : la signature du renforcement. La simulation permet des millions d'essais sans casser de matériel — c'est pour ça que robotique et renforcement vont si bien ensemble."},
    {ty:"🐛 Repère l'erreur",q:"Un consultant affirme : « Avec l'apprentissage supervisé, pas besoin de préparer des données : l'IA trouve toute seule les catégories. » Le problème ?",opts:[{t:"Il décrit le non supervisé — le supervisé exige justement des exemples étiquetés, souvent coûteux à préparer",ok:true},{t:"Rien, c'est exact"},{t:"L'erreur est que l'IA ne trouve jamais de catégories"},{t:"Il fallait dire « réseaux de neurones » au lieu de « supervisé »"}],fb:"Confusion classique entre les deux familles — et pas anodine : elle escamote le premier poste de coût du projet (l'étiquetage). Savoir la repérer t'évitera des devis fantaisistes."}]},
  {id:"l13",title:"La donnée, carburant",
   obj:["Expliquer « garbage in, garbage out » avec un exemple industriel","Comprendre pourquoi la représentativité des données décide du succès","Savoir où part vraiment le budget d'un projet IA"],
   fiches:[
    {t:"Garbage in, garbage out",h:"<p>La qualité d'un modèle <b>plafonne à la qualité de ses données</b>. Erreurs de saisie, doublons, champs vides, biais : tout ce qui entre ressort dans les prédictions.</p><p>Un modèle moyen nourri de bonnes données bat presque toujours un modèle brillant nourri de données douteuses.</p><p>C'est la loi la plus solide du domaine — et la plus ignorée dans les slides marketing.</p>"},
    {t:"Le modèle n'apprend que ce qu'on lui montre",h:"<p>Si toutes les photos de défauts viennent de la ligne A, sous un seul éclairage, le modèle échouera sur la ligne B : c'est le problème de <b>représentativité</b>.</p><p>Pire : les cas les plus importants (la panne grave, le défaut critique) sont souvent les plus <b>rares</b> dans l'historique — donc les moins appris.</p><p>Un jeu de données n'est pas bon parce qu'il est gros : il est bon parce qu'il ressemble à la réalité qu'il devra affronter.</p>"},
    {t:"Où part vraiment le budget",h:"<p>Dans un projet ML réel, <b>l'essentiel du temps part dans les données</b> : collecter, nettoyer, étiqueter, vérifier. L'algorithme, lui, est souvent standard.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Un client : « Pas de souci, on a 15 ans de données dans notre PLM ! » Tes questions de Field CTO : sont-elles <i>propres</i> (saisies fiables ?), <i>étiquetées</i> (qui a noté les causes de panne ?), <i>représentatives</i> (couvrent-elles le parc actuel ?). C'est là — pas dans le choix de l'algorithme — que se joue le devis et le succès.</div>"}],
   resume:["Garbage in, garbage out : la sortie plafonne à la qualité de l'entrée — loi n°1 du ML.","Le modèle n'apprend que ce qu'on lui montre : données non représentatives = échec en production.","Les cas critiques sont souvent les plus rares dans l'historique, donc les moins bien appris.","L'essentiel du budget part dans les données (collecte, nettoyage, étiquetage), pas dans l'algorithme."],
   quiz:[
    {ty:"QCM",q:"Que signifie « garbage in, garbage out » appliqué au machine learning ?",opts:[{t:"La qualité des prédictions est bornée par la qualité des données d'entraînement",ok:true},{t:"Les modèles produisent des déchets numériques"},{t:"Il faut supprimer les données inutilisées"},{t:"Les mauvaises prédictions sont automatiquement filtrées"}],fb:"Un modèle ne corrige pas ses données : il les reflète, biais et erreurs compris. Aucun algorithme, si sophistiqué soit-il, ne transforme un historique douteux en prédictions fiables."},
    {ty:"🎯 Scénario métier",q:"Un modèle de prévision de pannes, entraîné uniquement sur les machines récentes de l'atelier, échoue sur le parc ancien. La cause la plus probable ?",opts:[{t:"Données non représentatives : le parc ancien n'était pas dans l'entraînement",ok:true},{t:"L'algorithme choisi était trop simple"},{t:"Les machines anciennes sont imprévisibles par nature"},{t:"Il fallait plus de puissance de calcul"}],fb:"Le modèle n'a jamais « vu » de machine ancienne : il ne peut pas prédire ce qu'on ne lui a pas montré. Avant d'accuser l'algorithme, toujours interroger la couverture des données."},
    {ty:"Vrai/Faux",vf:true,q:"« Plus on a de données, meilleur sera le modèle — quelle que soit leur qualité. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"Le volume ne rachète pas la qualité : des millions d'exemples biaisés donnent un modèle massivement biaisé, avec en prime une confiance trompeuse. Gros ≠ bon."},
    {ty:"Texte à trou",q:"Dans un projet ML réel, l'essentiel du temps part dans la ___ des données.",opts:[{t:"préparation",ok:true},{t:"suppression"},{t:"compression"},{t:"impression"}],fb:"Collecte, nettoyage, étiquetage, vérification : la préparation des données est le vrai chantier — souvent cité autour de 80 % de l'effort. À rappeler à tout client qui budgète « un algorithme »."},
    {ty:"🐛 Repère l'erreur",q:"Un chef de projet : « On a 10 ans d'historique de maintenance, on lance l'entraînement directement, pas besoin de vérifier. » Le problème ?",opts:[{t:"Un historique long peut être plein de saisies bâclées, de champs vides et de pratiques qui ont changé — l'audit des données est le préalable, pas une option",ok:true},{t:"Rien : 10 ans, c'est largement suffisant"},{t:"Il faudrait plutôt 20 ans d'historique"},{t:"L'erreur est d'utiliser des données de maintenance"}],fb:"Qui a rempli ces comptes-rendus, avec quelle rigueur, selon quelles conventions (qui ont changé 3 fois) ? Un historique n'est pas un jeu de données : il le devient après audit et nettoyage."},
    {ty:"🔍 Analyse",q:"Un outil d'aide au recrutement défavorise systématiquement certains profils. L'enquête montre qu'il a été entraîné sur 10 ans d'embauches passées. Que s'est-il passé ?",opts:[{t:"Le modèle a appris et reproduit les biais présents dans les décisions historiques",ok:true},{t:"L'algorithme a développé ses propres préjugés"},{t:"Les données étaient trop récentes"},{t:"C'est un dysfonctionnement aléatoire"}],fb:"Le modèle n'invente pas de préjugés : il industrialise ceux de ses données. Cas réel et célèbre (l'outil de recrutement d'un géant du e-commerce, abandonné pour cette raison) — parfait pour expliquer le sujet à un COMEX."}]},
  {id:"l14",title:"Entraînement, inférence et le piège du par-cœur",
   obj:["Distinguer la phase d'entraînement de la phase d'inférence","Expliquer le surapprentissage avec une analogie simple","Challenger un « 99 % de précision » comme un pro"],
   fiches:[
    {t:"L'école, puis le travail",h:"<p>Un modèle vit deux phases. L'<b>entraînement</b> : longue, coûteuse, gourmande en calcul — c'est l'école.</p><p>L'<b>inférence</b> : le modèle entraîné répond à des cas nouveaux, vite et pour pas cher — c'est le travail quotidien.</p><p>Beaucoup de malentendus clients (coûts, mises à jour, « il apprend de nous ? ») se dissipent dès que ces deux phases sont distinguées.</p>"},
    {t:"Le piège du par-cœur",h:"<p>Un modèle peut apprendre <b>par cœur</b> ses exemples au lieu d'en tirer des règles générales : parfait sur ses données d'entraînement, mauvais sur tout cas nouveau.</p><p>C'est le <b>surapprentissage</b> — l'élève qui récite le corrigé mais échoue dès que l'énoncé change.</p><p>Plus un modèle est puissant, plus il est capable de mémoriser au lieu de comprendre : la puissance ne protège pas du par-cœur, elle l'aggrave.</p>"},
    {t:"Le test honnête",h:"<p>La parade : garder de côté des données que le modèle n'a <b>jamais vues</b>, et mesurer la performance dessus. C'est la seule note qui compte.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Une démo t'annonce « 99 % de précision ». Ta question de Field CTO : « Mesurée sur des données jamais vues, ou sur celles de l'entraînement ? » Dans le premier cas, on discute. Dans le second, le chiffre ne vaut rien — et la tête du présentateur te dira s'il le savait.</div>"}],
   resume:["Entraînement = l'école (long, coûteux) ; inférence = le travail (rapide, répété). Deux phases, deux coûts.","Surapprentissage = apprendre par cœur au lieu de généraliser : brillant sur ses exemples, nul sur du neuf.","La seule mesure honnête : la performance sur des données jamais vues pendant l'entraînement.","Réflexe pro devant un score : « mesuré sur quoi ? » avant « combien ? »."],
   quiz:[
    {ty:"QCM",q:"Quelle est la différence entre entraînement et inférence ?",opts:[{t:"L'entraînement construit le modèle (long, coûteux) ; l'inférence l'utilise sur des cas nouveaux (rapide)",ok:true},{t:"L'inférence est la version améliorée de l'entraînement"},{t:"L'entraînement se fait en production, l'inférence en laboratoire"},{t:"Ce sont deux noms pour la même chose"}],fb:"L'école puis le travail. Cette distinction explique au passage la structure des coûts d'un projet IA : un gros investissement d'entraînement, puis un coût d'usage à la requête."},
    {ty:"Texte à trou",q:"Un modèle excellent sur ses exemples d'entraînement mais mauvais sur des cas nouveaux souffre de ___.",opts:[{t:"surapprentissage",ok:true},{t:"sous-alimentation"},{t:"surchauffe"},{t:"régression"}],fb:"Surapprentissage (overfitting) : la mémorisation a pris le pas sur la généralisation. Un des rares termes techniques qui vaut la peine d'être placé tel quel en réunion — avec l'analogie de l'élève par cœur."},
    {ty:"Vrai/Faux",vf:true,q:"« Un modèle déployé en production s'améliore automatiquement à chaque prédiction qu'il fait. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"L'inférence n'entraîne rien : le modèle applique ce qu'il a appris, point. Pour qu'il s'améliore, il faut relancer un entraînement — une opération volontaire, planifiée et coûteuse."},
    {ty:"🎯 Scénario métier",q:"Un fournisseur annonce « 99,8 % de réussite » pour son module de détection. En creusant : le chiffre est mesuré sur les données d'entraînement. Ta réaction :",opts:[{t:"Le chiffre est sans valeur — demander la performance sur des données jamais vues",ok:true},{t:"Excellent score, on peut signer"},{t:"Demander à monter à 99,9 %"},{t:"Demander le même test sur deux fois plus de données d'entraînement"}],fb:"Sur ses propres données d'entraînement, même un modèle en surapprentissage complet frôle la perfection — c'est réciter le corrigé. Seule la performance sur données inédites prédit la production."},
    {ty:"🔍 Analyse",q:"Un modèle de contrôle qualité affichait d'excellents résultats au labo, mais déçoit en production. L'explication la plus probable ?",opts:[{t:"Il a appris par cœur les cas du labo au lieu de généraliser aux conditions réelles",ok:true},{t:"Les opérateurs l'utilisent mal"},{t:"Le modèle s'est dégradé pendant l'installation"},{t:"La production génère trop de données"}],fb:"Le grand écart labo/production est la signature du surapprentissage (ou de données de labo non représentatives — les deux cousins). D'où la règle : valider en conditions réelles avant de généraliser."},
    {ty:"🐛 Repère l'erreur",q:"Un stagiaire propose : « Pour gagner du temps, j'ai utilisé les mêmes données pour entraîner ET pour tester le modèle. » Le problème ?",opts:[{t:"La performance mesurée sera illusoire : le modèle est noté sur des questions dont il connaît déjà le corrigé",ok:true},{t:"Aucun : ça fait deux fois plus de données utiles"},{t:"Il aurait fallu chiffrer les données d'abord"},{t:"Le problème est juridique, pas technique"}],fb:"Tester sur les données d'entraînement, c'est faire passer l'examen avec les réponses dans la poche. La séparation entraînement/test est non négociable — la première chose à vérifier dans tout rapport de perf."}]}
