 tp:{id:"tp1",title:"« L'IA va remplacer vos ingénieurs »",
  intro:"Hélène, DG de MécaNova, t'attrape après un comité : « J'ai lu ce week-end que l'IA allait remplacer les ingénieurs d'ici 5 ans. J'ai 120 personnes au BE. Je dois m'inquiéter ? Je dois investir ? Les deux ? »<br><br>Tu joues ton futur rôle : la voix posée qui démêle le vrai du faux. À chaque étape, choisis ta réponse.",
  steps:[
   {label:"Étape 1 — La question qui fâche",q:"« Alors, l'IA va remplacer mes ingénieurs ? » Ta première réponse :",opts:[
    {t:"« Le ML apprend des exemples : il excelle sur les tâches répétitives à motifs — pré-trier, détecter, prévoir. Le jugement d'ingénierie, l'arbitrage, la responsabilité : non. La vraie question est quelles tâches, pas quels postes. »",ok:true,fb:"Recadrage juste : déplacer le débat des « postes remplacés » vers les « tâches transformées ». C'est à la fois plus exact techniquement et plus actionnable pour une DG."},
    {t:"« Oui, mieux vaut anticiper un plan de réduction des effectifs. »",fb:"Techniquement faux (le ML n'absorbe pas le jugement d'ingénierie) et stratégiquement destructeur : tu viens de transformer une curiosité en panique."},
    {t:"« Non, c'est du marketing. Rien ne changera pour vous. »",fb:"L'excès inverse : rassurer en niant la transformation, c'est préparer la DG à être surprise dans deux ans — et toi à ne plus être écouté."}]},
   {label:"Étape 2 — Du concret",q:"Hélène : « D'accord, alors montrez-moi un exemple concret chez NOUS. » Quel premier cas d'usage proposes-tu ?",opts:[
    {t:"« Le pré-tri automatique des non-conformités récurrentes, avec validation par vos ingénieurs : la machine classe le répétitif, l'humain garde la décision. »",ok:true,fb:"Cas d'usage idéal : tâche répétitive à motifs (le point fort du ML), historique d'exemples disponible, et l'humain reste dans la boucle. Exactement le message de l'étape 1, incarné."},
    {t:"« Remplacer la validation finale des plans par un modèle : c'est là que le gain est maximal. »",fb:"Tu attaques précisément ce que tu viens de dire hors de portée : la validation engage la responsabilité et le jugement. Incohérent et risqué."},
    {t:"« Un chatbot RH pour répondre aux questions sur les congés. »",fb:"Pas absurde, mais hors sujet : Hélène parle de son bureau d'études. Tu rates l'occasion de montrer que tu as compris SON terrain."}]},
   {label:"Étape 3 — Le sujet données",q:"Hélène : « Et pourquoi tous ces articles parlent de données, de données, de données ? » Ta réponse :",opts:[
    {t:"« Parce que le modèle n'apprend que ce qu'on lui montre : vos historiques de non-conformités, leur qualité et leur couverture décideront du succès bien plus que le choix de l'algorithme. »",ok:true,fb:"Garbage in garbage out + représentativité, en une phrase de DG. Tu viens aussi de préparer le terrain pour le vrai devis : la préparation des données."},
    {t:"« C'est un argument commercial des vendeurs de serveurs de stockage. »",fb:"Cynique et faux : la donnée est réellement le facteur limitant n°1 des projets ML. Tu désarmes ta propre crédibilité."},
    {t:"« Plus on stocke de données, plus l'IA devient intelligente, c'est mécanique. »",fb:"Le volume ne rachète pas la qualité ni la représentativité — tu viens de répéter le mythe que la leçon 3 démonte."}]},
   {label:"Étape 4 — 🔍 Le slide du cabinet",q:"Un cabinet de conseil présente à Hélène : « [1] L'IA transforme l'ingénierie · [2] Commencez par un diagnostic des cas d'usage · [3] Notre IA apprend seule, sans données préparées ni experts métier · [4] Pilotez par la valeur, pas par la technologie ». Quelle affirmation challenger ?",opts:[
    {t:"Affirmation 3 — « apprend seule, sans données préparées ni experts métier »",ok:true,fb:"Le supervisé — la famille reine en industrie — exige exactement l'inverse : des données préparées ET des experts pour les étiqueter. Les affirmations 1, 2 et 4 sont d'ailleurs raisonnables : savoir isoler LA phrase fausse au milieu du crédible, c'est tout l'art."},
    {t:"Affirmation 1 — « l'IA transforme l'ingénierie »",fb:"Générique mais défendable — pas le drapeau rouge."},
    {t:"Affirmation 2 — « commencez par un diagnostic »",fb:"C'est même une bonne pratique. Rien à challenger ici."},
    {t:"Affirmation 4 — « pilotez par la valeur »",fb:"Difficile de contester… c'est justement ce que tu prêches. Le piège est ailleurs."}]}],
  post:"<h4>💼 Ébauche de post LinkedIn générée</h4><p><b>« Ce que j'ai répondu à une DG qui craignait que l'IA remplace ses ingénieurs »</b></p><p>La question m'est posée à chaque comité : « l'IA va-t-elle remplacer mes ingénieurs ? » Ma réponse tient en trois idées.</p><p>(1) Le machine learning apprend des exemples : il excelle sur le répétitif à motifs — pré-trier, détecter, prévoir. Le jugement d'ingénierie et la responsabilité restent humains. La bonne question n'est pas « quels postes » mais « quelles tâches ».</p><p>(2) Le premier cas d'usage gagnant est presque toujours le même : la machine classe le répétitif, l'expert garde la décision.</p><p>(3) Le succès se jouera dans vos données — leur qualité, leur couverture — bien plus que dans le choix de l'algorithme. Et si on vous promet une IA « qui apprend seule, sans données ni experts », changez de fournisseur.</p><p><i>#IA #Ingénierie #PLM</i></p>"}},
 {id:"ch2",num:2,e:"🧠",title:"Dans le cerveau des réseaux",soon:false,teaser:"Deep learning : neurones, profondeur, vision… et les embeddings, le concept pivot.",lessons:[
  {id:"l21",title:"Le neurone artificiel, sans les maths",
   obj:["Donner l'intuition de ce qu'est un neurone artificiel","Expliquer ce que veut dire « apprendre » pour un réseau","Démonter la métaphore du « cerveau électronique »"],
   fiches:[
    {t:"Un mini-calculateur qui vote",h:"<p>Un neurone artificiel est un <b>mini-calculateur</b> : il reçoit des nombres, les pondère (certaines entrées comptent plus que d'autres), les additionne, et émet un signal si le total dépasse un seuil.</p><p>Seul, il ne sait presque rien faire — tout au plus tracer une frontière simple entre deux cas.</p><p>C'est un capteur qui vote, rien de plus. La magie n'est pas dans le neurone : elle est dans le nombre.</p>"},
    {t:"Apprendre = régler des curseurs",h:"<p>Les pondérations de chaque neurone sont les fameux <b>poids</b> — des millions, parfois des milliards de petits curseurs.</p><p>L'entraînement, c'est un mécanisme automatique qui compare la sortie du réseau à la bonne réponse, mesure l'erreur, et ajuste les curseurs pour la réduire. Encore et encore, sur des millions d'exemples.</p><p>Personne ne règle rien à la main : <b>l'erreur guide le réglage</b>.</p>"},
    {t:"Du neurone au réseau",h:"<p>Empilés en couches et connectés entre eux, ces neurones simples forment un <b>réseau</b> capable de choses stupéfiantes — c'est l'effet de masse, pas l'intelligence de l'unité.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Un client : « Donc il y a un cerveau dans la machine ? » Réponse de Field CTO : « Non — des multiplications et des millions de réglages ajustés automatiquement. La métaphore du cerveau a inspiré l'architecture, mais la réalité est mathématique. » Démystifier ainsi rassure les inquiets ET calme les rêveurs : deux services en une phrase.</div>"}],
   resume:["Un neurone artificiel = entrées pondérées, somme, seuil : un mini-calculateur qui vote.","Apprendre = ajuster automatiquement des millions de poids, guidé par l'erreur mesurée sur les exemples.","La puissance vient du réseau (l'effet de masse), pas du neurone individuel.","« Cerveau électronique » est une métaphore d'inspiration, pas une description : la réalité est mathématique."],
   quiz:[
    {ty:"QCM",q:"Que fait fondamentalement un neurone artificiel ?",opts:[{t:"Il combine ses entrées selon des pondérations et émet un signal si le total dépasse un seuil",ok:true},{t:"Il stocke une information comme une cellule mémoire"},{t:"Il exécute un programme miniature écrit par un développeur"},{t:"Il communique par impulsions électriques biologiques"}],fb:"Pondérer, sommer, comparer à un seuil : c'est tout. La simplicité de l'unité rend d'autant plus frappant ce que des milliards d'unités entraînées ensemble accomplissent."},
    {ty:"Vrai/Faux",vf:true,q:"« Les ingénieurs règlent un par un les poids d'un réseau de neurones pour obtenir le bon comportement. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"Des milliards de poids : aucun humain ne les touche. Un algorithme mesure l'erreur du réseau et ajuste les curseurs automatiquement, exemple après exemple. Les humains conçoivent l'architecture et fournissent les données."},
    {ty:"Texte à trou",q:"Pour un réseau de neurones, apprendre consiste à ajuster ses ___ jusqu'à réduire l'erreur.",opts:[{t:"poids",ok:true},{t:"écrans"},{t:"circuits"},{t:"processeurs"}],fb:"Les poids (les pondérations des connexions) sont la matière même de l'apprentissage — et le lien direct avec les « paramètres » des LLM que tu as vus au chapitre 3."},
    {ty:"🐛 Repère l'erreur",q:"Une brochure : « Notre réseau de neurones réfléchit exactement comme un cerveau humain, en plus rapide. » Le problème ?",opts:[{t:"La métaphore est abusive : un réseau fait des calculs pondérés ajustés statistiquement — ni conscience, ni raisonnement humain",ok:true},{t:"Rien : c'est la définition du deep learning"},{t:"L'erreur est « en plus rapide » : c'est en fait plus lent"},{t:"Il fallait écrire « cerveau animal »"}],fb:"« Inspiré du cerveau » (vrai, vaguement) est devenu « fonctionne comme un cerveau » (faux). Cette inflation verbale nourrit autant les peurs irrationnelles que les attentes délirantes — la repérer, c'est ton métier."},
    {ty:"🔍 Analyse",q:"Pourquoi l'entraînement d'un grand réseau exige-t-il des fermes de GPU pendant des semaines ?",opts:[{t:"Des milliards de poids sont ajustés petit à petit, sur des millions d'exemples repassés de nombreuses fois",ok:true},{t:"Les GPU servent surtout à refroidir les serveurs"},{t:"Chaque neurone doit être programmé individuellement"},{t:"C'est une exigence réglementaire de sécurité"}],fb:"Le volume de calcul = (milliards de réglages) × (millions d'exemples) × (multiples passages). Comprendre ça, c'est comprendre pourquoi entraîner coûte des millions… et pourquoi l'inférence, elle, est bon marché."},
    {ty:"🎯 Scénario métier",q:"Un client te demande si « un petit réseau d'une dizaine de neurones » pourrait détecter des défauts complexes sur ses pièces. Ta réponse :",opts:[{t:"Non : la capacité vient de la masse et de la profondeur — une tâche visuelle complexe demande des réseaux à des millions de poids",ok:true},{t:"Oui, dix neurones bien réglés suffisent toujours"},{t:"Non, car les neurones ne traitent pas les images"},{t:"Oui, à condition de les régler à la main"}],fb:"Un petit réseau trace des frontières simples ; la complexité visuelle exige la profondeur et la masse. C'est le lien direct avec la leçon suivante : pourquoi « profond » change tout."}]},
  {id:"l22",title:"Pourquoi « profond » change tout",
   obj:["Expliquer ce que font les couches successives d'un réseau","Comprendre pourquoi le deep learning a tout débloqué vers 2012","Connaître la contrepartie : la boîte noire"],
   fiches:[
    {t:"Des couches qui construisent du sens",h:"<p>Dans un réseau <b>profond</b>, chaque couche transforme la sortie de la précédente : sur une image, les premières couches détectent des bords, les suivantes des motifs, puis des formes, puis des objets entiers.</p><p>Cette hiérarchie <b>s'apprend toute seule</b> : personne n'a programmé « cherche des bords ».</p><p>« Deep learning » ne veut rien dire d'autre : un apprentissage à travers de nombreuses couches.</p>"},
    {t:"La révolution de 2012",h:"<p>Avant le deep learning, des experts fabriquaient <b>à la main</b> les indicateurs que la machine devait regarder (contraste, contours, textures…). Des années de travail par domaine.</p><p>Le deep learning a renversé ça : le réseau <b>découvre lui-même</b> les bons indicateurs, à condition d'avoir beaucoup de données et de calcul.</p><p>C'est ce renversement qui a fait exploser la vision et la reconnaissance vocale au début des années 2010 — et ouvert la voie aux LLM.</p>"},
    {t:"La contrepartie : la boîte noire",h:"<p>Ce que le réseau a appris est encodé dans des millions de poids : difficile d'expliquer <b>pourquoi</b> il a pris UNE décision précise.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — En industrie, l'explicabilité peut être une exigence dure (qualité, sécurité, réglementaire) : « pourquoi cette pièce a-t-elle été rejetée ? » doit parfois avoir une réponse. Question de Field CTO à tout fournisseur : « Quel niveau d'explication des décisions votre système fournit-il ? » — la réponse départage les offres sérieuses.</div>"}],
   resume:["Chaque couche transforme la précédente : bords → motifs → formes → objets. La hiérarchie s'apprend seule.","Avant le DL, les indicateurs étaient fabriqués à la main par des experts ; le DL les découvre lui-même.","Ce renversement (2012) a débloqué vision et parole — puis ouvert la voie aux LLM.","Contrepartie : la boîte noire. L'explicabilité peut être une exigence industrielle dure — à poser à tout fournisseur."],
   quiz:[
    {ty:"QCM",q:"Quel est le rôle des couches successives d'un réseau profond ?",opts:[{t:"Construire des représentations de plus en plus abstraites, des détails bruts jusqu'aux concepts",ok:true},{t:"Vérifier chacune le travail de la précédente"},{t:"Stocker les données d'entraînement par ordre chronologique"},{t:"Accélérer le calcul en le répartissant"}],fb:"Bords → motifs → formes → objets : chaque couche monte d'un niveau d'abstraction. Et cette hiérarchie émerge de l'entraînement — personne ne l'a programmée."},
    {ty:"Texte à trou",q:"Avant le deep learning, les indicateurs que la machine devait regarder étaient fabriqués à la ___ par des experts.",opts:[{t:"main",ok:true},{t:"chaîne"},{t:"volée"},{t:"marge"}],fb:"Le « feature engineering » manuel : des années d'expertise par domaine. Le DL l'a automatisé — c'est le cœur exact de la révolution, et une excellente phrase d'explication client."},
    {ty:"Vrai/Faux",vf:true,q:"« On peut toujours expliquer précisément pourquoi un réseau profond a pris une décision donnée. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"La décision est répartie dans des millions de poids : l'explication fine reste difficile (un champ de recherche entier — l'explicabilité — s'y consacre). D'où l'enjeu industriel quand la réglementation exige de justifier un rejet."},
    {ty:"🔍 Analyse",q:"La reconnaissance vocale stagnait depuis des années, puis a fait un bond spectaculaire au début des années 2010. Le déclencheur ?",opts:[{t:"Le deep learning : le réseau apprend ses propres représentations du son au lieu d'utiliser des indicateurs fabriqués à la main",ok:true},{t:"Les micros sont devenus meilleurs"},{t:"Les linguistes ont enfin fini de décrire toutes les langues"},{t:"Internet est devenu plus rapide"}],fb:"Mêmes micros, autre paradigme : les représentations apprises ont pulvérisé des décennies d'indicateurs manuels. Le même bond a eu lieu en vision au même moment, et pour la même raison."},
    {ty:"🎯 Scénario métier",q:"Un équipementier ferroviaire doit justifier réglementairement chaque rejet de pièce. Il veut un contrôle qualité par deep learning. Ton conseil :",opts:[{t:"Poser l'exigence d'explicabilité dès le cahier des charges : prévoir un système qui documente ses décisions, ou un humain qui confirme chaque rejet",ok:true},{t:"Aucun problème, le réseau expliquera ses choix"},{t:"Renoncer à l'IA dans le ferroviaire"},{t:"Utiliser un réseau plus petit pour qu'il soit lisible"}],fb:"Ni naïveté (« il expliquera ») ni renoncement : intégrer la contrainte d'explicabilité dans l'architecture ET le process. C'est ce réflexe qui distingue le conseil sérieux de la démo enthousiaste."},
    {ty:"🐛 Repère l'erreur",q:"Un article : « Le deep learning a gagné parce qu'il a supprimé le besoin de données d'entraînement. » Le problème ?",opts:[{t:"C'est l'inverse : le deep learning exige PLUS de données que les approches précédentes — il a supprimé la fabrication manuelle des indicateurs",ok:true},{t:"Rien, c'est historiquement exact"},{t:"Le deep learning n'a jamais « gagné »"},{t:"L'erreur porte sur la date, pas sur les données"}],fb:"Le DL a troqué l'expertise manuelle contre un appétit massif en données et en calcul. Confondre les deux, c'est rater la vraie contrepartie du deep learning — celle qui structure les budgets."}]},
  {id:"l23",title:"Quand la machine voit",
   obj:["Distinguer classification, détection et segmentation","Citer les usages industriels mûrs de la vision","Savoir ce qui conditionne la réussite d'un projet vision"],
   fiches:[
    {t:"Trois questions, trois techniques",h:"<p>La vision par ordinateur répond à trois questions de précision croissante. <b>Classification</b> : qu'y a-t-il sur l'image ? (« pièce rayée »).</p><p><b>Détection</b> : où est-ce ? (un cadre autour de la rayure). <b>Segmentation</b> : quels contours exacts ? (la rayure pixel par pixel).</p><p>Plus la question est précise, plus l'étiquetage des exemples coûte cher — choisir le bon niveau est déjà une décision de projet.</p>"},
    {t:"L'atelier, terrain de jeu de la vision",h:"<p>La vision est le ML industriel le plus <b>mûr</b> : contrôle visuel qualité, lecture de références et de codes, vérification d'assemblages, sécurité (port des EPI), tri automatique.</p><p>La recette du succès : des tâches visuelles répétitives, un verdict clair, des images abondantes.</p><p>Quand ces trois conditions sont réunies, la vision industrielle est du ML qui marche vraiment — pas une promesse.</p>"},
    {t:"Ce qui fait réussir (ou couler) un projet vision",h:"<p>Trois conditions décident de tout : un <b>éclairage et un cadrage maîtrisés</b>, assez d'exemples de <b>défauts</b> (or ils sont rares, par définition), et un choix assumé entre <b>faux positifs</b> (rejeter à tort) et <b>faux négatifs</b> (laisser passer).</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Le dimensionnement d'un projet vision ne commence pas par « quel algorithme ? » mais par : « Combien d'images de défauts avez-vous, et dans quelles conditions de prise de vue ? » Cette seule question te place au-dessus de la moitié des vendeurs de solutions.</div>"}],
   resume:["Classification (quoi ?), détection (où ?), segmentation (quels contours ?) : trois niveaux, trois coûts d'étiquetage.","La vision est le ML industriel le plus mûr : qualité, lecture de références, assemblages, sécurité, tri.","Les défauts sont rares par définition : rassembler leurs images est LE goulot des projets vision.","Le réglage faux positifs / faux négatifs est une décision métier, pas technique."],
   quiz:[
    {ty:"QCM",q:"Quelle est la différence entre classification et détection en vision ?",opts:[{t:"La classification dit ce qu'il y a sur l'image, la détection dit aussi où",ok:true},{t:"La classification est plus précise que la détection"},{t:"La détection fonctionne sans entraînement"},{t:"Ce sont deux noms du même traitement"}],fb:"« Quoi » versus « quoi + où ». La segmentation ajoute « quels contours exacts ». Chaque niveau de précision supplémentaire alourdit l'étiquetage — donc le budget."},
    {ty:"🎯 Scénario métier",q:"Un industriel veut savoir précisément OÙ se trouve chaque fissure sur ses pièces moulées, pour guider la retouche. Quel niveau de vision ?",opts:[{t:"Détection ou segmentation : il faut localiser, pas seulement classer",ok:true},{t:"Classification : « fissuré / non fissuré » suffit"},{t:"Aucun : les fissures ne se voient pas en image"},{t:"Un LLM textuel"}],fb:"« Pour guider la retouche » = besoin de localisation, donc détection (un cadre) voire segmentation (le tracé exact). Relier le besoin métier au bon niveau technique, c'est exactement le rôle du conseil."},
    {ty:"Vrai/Faux",vf:true,q:"« Comme les défauts sont rares en production, entraîner un détecteur de défauts est facile : il y a peu de cas à apprendre. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"C'est l'inverse : la rareté des défauts est LE problème. Le modèle a besoin de nombreux exemples de chaque type de défaut… qui par définition n'abondent pas. D'où campagnes de collecte, voire défauts provoqués volontairement."},
    {ty:"Texte à trou",q:"Laisser passer une pièce défectueuse, c'est un faux ___.",opts:[{t:"négatif",ok:true},{t:"positif"},{t:"départ"},{t:"semblant"}],fb:"Faux négatif = défaut manqué (le système dit « rien à signaler » à tort) ; faux positif = bonne pièce rejetée. Arbitrer entre les deux est une décision de coût métier — pas un réglage d'informaticien."},
    {ty:"🐛 Repère l'erreur",q:"Un intégrateur : « Peu importe les variations d'éclairage sur votre ligne, le modèle s'adaptera tout seul. » Le problème ?",opts:[{t:"Un modèle ne généralise pas à des conditions qu'il n'a pas vues : les variations d'éclairage doivent être maîtrisées ou présentes dans les données d'entraînement",ok:true},{t:"Rien : les réseaux modernes sont insensibles à la lumière"},{t:"L'éclairage ne concerne que les caméras noir et blanc"},{t:"Le problème est le coût de l'éclairage"}],fb:"« Il s'adaptera » = la représentativité balayée d'un revers de main. L'éclairage maîtrisé est un des secrets les moins glamour et les plus décisifs de la vision industrielle qui marche."},
    {ty:"🔍 Analyse",q:"Pourquoi le contrôle qualité visuel est-il devenu LE cas d'usage vision le plus répandu en usine ?",opts:[{t:"Tâche répétitive, verdict clair, images abondantes : les trois conditions de réussite du ML y sont réunies",ok:true},{t:"Parce que les caméras sont devenues gratuites"},{t:"Parce qu'aucun humain ne sait contrôler visuellement"},{t:"Parce que la réglementation l'impose partout"}],fb:"Répétitif + verdict binaire + volume d'images : le triplé gagnant. Quand tu évalues un cas d'usage vision, cherche ces trois conditions — leur absence explique la plupart des échecs."}]},
  {id:"l24",title:"Les embeddings : le sens en géométrie",
   obj:["Expliquer ce qu'est un embedding avec une image simple","Comprendre la recherche par similarité (sans mots-clés)","Voir pourquoi ce concept est le pivot de la RAG et du PLM intelligent"],
   fiches:[
    {t:"Traduire le sens en coordonnées",h:"<p>Un <b>embedding</b> transforme n'importe quoi — un mot, un document, une image, une pièce — en une liste de nombres, comme des coordonnées dans un espace géant.</p><p>Le tour de force : cet espace est organisé pour que <b>les choses similaires soient proches</b>. « Vis » et « boulon » sont voisins ; « vis » et « chocolat » sont loin.</p><p>Le sens devient de la <b>distance</b>. C'est l'idée la plus rentable de tout ton parcours.</p>"},
    {t:"Chercher par ressemblance, pas par mot-clé",h:"<p>Avec des embeddings, on peut chercher « ce qui ressemble » : les documents proches d'une question, les images proches d'une photo — <b>même sans aucun mot en commun</b>.</p><p>Une recherche classique rate « durée de couverture » quand tu tapes « garantie » ; une recherche <b>sémantique</b> les rapproche, car leurs embeddings sont voisins.</p><p>C'est le moteur caché derrière toutes les recherches « intelligentes » modernes.</p>"},
    {t:"Le concept pivot du parcours",h:"<p>Retiens bien cette brique : la <b>RAG</b> (chapitre 4) = retrouver par embeddings les bons passages de VOS documents, puis laisser le LLM répondre avec.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — La réutilisation de conception, serpent de mer du PLM : un ingénieur redessine une pièce qui existe déjà, faute de l'avoir retrouvée. La recherche de pièces similaires par embeddings (géométrie, désignation, contexte) attaque exactement ce problème. Quand tu en parles à un client PLM, tu parles de SON quotidien avec la techno de demain.</div>"}],
   resume:["Un embedding = traduire une chose en coordonnées telles que les choses similaires sont proches : le sens devient distance.","La recherche sémantique retrouve par ressemblance, même sans mot-clé commun.","La RAG (chapitre 4) = embeddings pour retrouver les bons passages + LLM pour répondre.","En PLM, la recherche de pièces similaires par embeddings attaque le serpent de mer de la réutilisation de conception."],
   quiz:[
    {ty:"QCM",q:"Qu'est-ce qu'un embedding ?",opts:[{t:"Une représentation numérique où les choses au sens proche ont des coordonnées proches",ok:true},{t:"Un format de compression d'images"},{t:"Un composant électronique embarqué"},{t:"Un protocole de chiffrement des données"}],fb:"Des coordonnées organisées par le sens : la similarité devient une distance mesurable. Tout le reste (recherche sémantique, RAG, similarité de pièces) découle de cette seule idée."},
    {ty:"Vrai/Faux",vf:true,q:"« Deux textes ne peuvent être reconnus comme proches que s'ils partagent au moins un mot en commun. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"C'était la limite de la recherche par mots-clés. Les embeddings capturent le sens : « délai de rétractation » et « combien de jours pour annuler » sont voisins sans partager un seul mot significatif."},
    {ty:"🎯 Scénario métier",q:"Un bureau d'études veut retrouver dans son PLM les pièces existantes semblables à une nouvelle pièce en cours de conception, pour éviter de la redessiner. La techno au cœur de la solution ?",opts:[{t:"Des embeddings : chaque pièce devient des coordonnées, la recherche renvoie les plus proches",ok:true},{t:"Un moteur de recherche par référence exacte"},{t:"Un tableur partagé des pièces existantes"},{t:"Un LLM qui devine si la pièce existe"}],fb:"La recherche par référence exacte suppose de connaître… la référence qu'on cherche. La similarité par embeddings retrouve « ce qui ressemble » — exactement le besoin de la réutilisation de conception."},
    {ty:"Texte à trou",q:"Dans un espace d'embeddings, la similarité de sens se mesure comme une ___.",opts:[{t:"distance",ok:true},{t:"vitesse"},{t:"température"},{t:"fréquence"}],fb:"Proche = similaire, loin = différent. « Le sens devient de la distance » est la phrase à ressortir telle quelle en clientèle : elle fait mouche à chaque fois."},
    {ty:"🔍 Analyse",q:"Le nouveau moteur de recherche interne d'une entreprise trouve la fiche « durée de garantie contractuelle » quand un employé tape « combien de temps sommes-nous couverts ». Qu'est-ce qui rend ça possible ?",opts:[{t:"Une recherche sémantique : les embeddings de la question et de la fiche sont proches, malgré l'absence de mots communs",ok:true},{t:"Quelqu'un a ajouté tous les synonymes à la main"},{t:"Le moteur a indexé plus de documents"},{t:"C'est une coïncidence statistique"}],fb:"Aucun mot commun, et pourtant trouvés voisins : la signature des embeddings. La liste de synonymes maintenue à la main est exactement l'artisanat que cette techno remplace."},
    {ty:"🐛 Repère l'erreur",q:"Une plaquette : « Notre recherche sémantique est plus rapide car elle compare les mots-clés plus efficacement. » Le problème ?",opts:[{t:"Contresens : la recherche sémantique ne compare justement PAS des mots-clés, elle compare des représentations du sens (embeddings)",ok:true},{t:"Rien : sémantique = mots-clés efficaces"},{t:"L'erreur porte sur la vitesse : c'est plus lent"},{t:"Il fallait écrire « métadonnées » au lieu de « mots-clés »"}],fb:"Vendre du sémantique en décrivant du mot-clé : le fournisseur n'a pas compris (ou espère que toi non plus). Un mot de vocabulaire mal employé dans une plaquette est souvent le meilleur détecteur de sérieux."}]}
 ],
 tp:{id:"tp2",title:"Des défauts de peinture sous l'œil de l'IA",
  intro:"Marc, directeur qualité de MécaNova, t'accueille en sortie de cabine de peinture : « Regarde : coulures, grains, manques… Mes contrôleurs passent 100 % des pièces en revue visuelle. Je veux une caméra et une IA qui fait ça. C'est faisable, oui ou non ? »<br><br>À chaque étape, choisis ta réponse de consultant.",
  steps:[
   {label:"Étape 1 — La première question",q:"Avant de répondre « faisable ou pas », que demandes-tu à Marc ?",opts:[
    {t:"« Combien d'images de défauts avez-vous — et de chaque type : coulures, grains, manques ? »",ok:true,fb:"LA question du projet vision : le goulot n'est jamais la caméra ni l'algorithme, mais les exemples de défauts — rares par définition. Marc répond : « Euh… on ne photographie que les pièces bonnes, pour les dossiers clients. » Tout est dit."},
    {t:"« Quel modèle de caméra comptez-vous acheter ? »",fb:"Le matériel se choisit en dernier, quand on sait ce qu'on doit voir et dans quelles conditions. Commencer par la caméra, c'est commencer par la fin."},
    {t:"« Rien — lançons un POC dès la semaine prochaine, on verra bien. »",fb:"Un POC sans données de défauts démontrera surtout… qu'on n'a pas de données. Tu grillerais la crédibilité du sujet pour les deux prochaines années."}]},
   {label:"Étape 2 — Le déséquilibre",q:"Après inventaire : 47 photos de défauts (tous types confondus) et 120 000 photos de pièces bonnes. Ton diagnostic :",opts:[
    {t:"« Le vrai chantier est là : campagne de collecte et d'étiquetage des défauts, en commençant par les 2-3 types les plus fréquents. La caméra attendra. »",ok:true,fb:"47 exemples répartis sur plusieurs types de défauts, c'est très en dessous du nécessaire. Plan réaliste : collecter en continu, étiqueter avec les contrôleurs (les vrais experts), et cibler d'abord les défauts fréquents. C'est moins sexy qu'un POC — c'est ce qui marchera."},
    {t:"« 120 000 images, c'est énorme : largement assez pour entraîner. »",fb:"Le volume est du mauvais côté : le modèle doit apprendre les DÉFAUTS, et il n'en a que 47 exemples. C'est le piège classique du déséquilibre de classes."},
    {t:"« Sans données de défauts, le projet est impossible. Abandonnez. »",fb:"Trop brutal : les données n'existent pas ENCORE — la collecte se lance et porte ses fruits en quelques mois. Enterrer un projet faisable est aussi grave que survendre un projet impossible."}]},
   {label:"Étape 3 — La mesure du succès",q:"Marc : « Et on saura que ça marche quand l'IA aura raison à combien — 95 % ? 99 % ? » Ta réponse :",opts:[
    {t:"« Un pourcentage global ne suffit pas : il faut fixer le coût d'un défaut livré (faux négatif) contre celui d'une bonne pièce rejetée (faux positif), régler le seuil selon VOS coûts, et router les cas douteux vers vos contrôleurs. »",ok:true,fb:"La précision globale masque tout : un système qui dit « bonne pièce » à 99,9 % aurait 99,9 % de réussite… en laissant passer tous les défauts. Faux positifs vs faux négatifs + contrôle humain sur le doute : c'est la réponse d'ingénieur, pas de vendeur."},
    {t:"« 99 %, c'est le standard du marché, visons ça. »",fb:"Un chiffre sorti du chapeau, sans lien avec les coûts réels de Marc. Et un « 99 % » peut être catastrophique selon la répartition des erreurs — voir la bonne réponse."},
    {t:"« L'important est que l'IA soit meilleure que vos contrôleurs sur tout, sinon inutile. »",fb:"Faux dilemme : le duo IA (le répétitif, sans fatigue) + contrôleurs (les cas douteux, l'expertise) bat presque toujours chacun séparément. Le tout-ou-rien est l'ennemi des déploiements réussis."}]},
   {label:"Étape 4 — 🔍 Le slide de l'intégrateur vision",q:"Un intégrateur présente : « [1] Caméras industrielles éprouvées · [2] Modèle affiné sur vos images · [3] 99,9 % de précision garantie dès l'installation, quel que soit l'éclairage · [4] Interface de reprise pour vos contrôleurs ». Quelle affirmation challenger en priorité ?",opts:[
    {t:"Affirmation 3 — « 99,9 % garanti dès l'installation, quel que soit l'éclairage »",ok:true,fb:"Double drapeau rouge : une performance garantie AVANT d'avoir vu les données réelles (sur quel jeu de test ?), et l'indifférence à l'éclairage — la représentativité balayée d'une phrase. Les affirmations 1, 2 et 4 sont, elles, raisonnables : l'art est d'isoler la promesse impossible au milieu du sérieux."},
    {t:"Affirmation 1 — les caméras éprouvées",fb:"Vérifiable par références clients — pas le signal d'alarme."},
    {t:"Affirmation 2 — le modèle affiné sur vos images",fb:"C'est même la bonne pratique (à condition d'avoir les images — voir étape 2). Pas le drapeau rouge."},
    {t:"Affirmation 4 — l'interface de reprise",fb:"Excellente nouvelle au contraire : l'humain dans la boucle est prévu. Le piège est ailleurs."}]}],
  post:"<h4>💼 Ébauche de post LinkedIn générée</h4><p><b>« Pourquoi votre projet d'IA qualité commencera par une campagne de photos (pas par un algorithme) »</b></p><p>Un directeur qualité m'a demandé cette semaine : « Une IA qui contrôle mes pièces peintes, c'est faisable ? » Ma première question l'a surpris : « Combien de photos de défauts avez-vous ? » Réponse : 47. Pour 120 000 photos de pièces bonnes.</p><p>C'est le paradoxe des projets vision : le modèle doit apprendre les défauts, et les défauts sont rares — c'est même pour ça qu'on fait de la qualité. Le vrai chantier n'est donc ni la caméra ni l'algorithme : c'est la collecte et l'étiquetage, avec vos contrôleurs comme experts.</p><p>Et quand un fournisseur vous garantit « 99,9 % dès l'installation, quel que soit l'éclairage » — demandez sur quelles données c'est mesuré. La réponse vaut tous les benchmarks.</p><p><i>#IA #Qualité #VisionIndustrielle #PLM</i></p>"}},
 {id:"ch3",num:3,e:"✨",title:"La révolution générative",soon:false,teaser:"LLMs : tokens, fabrication, prompting, hallucinations, multimodal.",lessons:[
  {id:"l31",title:"Prédire le mot suivant",
   obj:["Expliquer en une phrase ce que fait réellement un LLM","Comprendre ce qu'est un token et ce que ça implique","Répondre à « mais est-ce qu'il comprend vraiment ? »"],
   fiches:[
    {t:"Une machine à deviner la suite",h:"<p>Un LLM n'a appris qu'une seule chose : <b>prédire le mot le plus probable</b> après une séquence de texte. « Le technicien serre le dernier ___ » → « boulon ».</p><p>Répétée des milliards de fois sur une bibliothèque gigantesque de textes, cette capacité finit par capturer la grammaire, les connaissances, et même une forme de raisonnement.</p><p>C'est un autocomplete devenu si bon qu'il en paraît intelligent.</p>"},
    {t:"Les tokens : l'unité de base",h:"<p>Le modèle ne voit ni lettres ni mots entiers : il découpe le texte en <b>tokens</b>, des morceaux de mots convertis en nombres (« industrialisation » → « industri / alis / ation »).</p><p>C'est pour ça qu'un LLM peut briller en stratégie et échouer à compter les lettres d'un mot : il ne les voit littéralement pas.</p><p>C'est aussi pour ça que les API d'IA se facturent au token — l'unité de mesure du domaine, comme le kWh en énergie.</p>"},
    {t:"L'émergence : quand la taille change tout",h:"<p>Un petit modèle prédit mal et ne sait rien faire d'autre. Mais en augmentant massivement la taille du modèle et des données, des capacités que personne n'a programmées <b>émergent</b> : traduire, résumer, structurer, coder.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Un client te demande : « Mais est-ce qu'il comprend vraiment ? » Réponse de Field CTO : « Il prédit — mais à cette échelle, la prédiction produit un comportement qui ressemble beaucoup à de la compréhension. La vraie question n'est pas philosophique : c'est de savoir où cette mécanique excelle et où elle piège. »</div>"}],
   resume:["Un LLM fait une seule chose : prédire le token suivant, très très bien.","Il voit des tokens (morceaux de mots numérisés), pas des lettres — d'où certaines erreurs surprenantes et la facturation au token.","À très grande échelle, des capacités non programmées émergent : c'est la révolution de 2020-2023.","« Il prédit » n'est pas une faiblesse en soi — c'est une mécanique dont il faut connaître les excellences et les pièges."],
   quiz:[
    {ty:"QCM",q:"Quelle est la tâche fondamentale pour laquelle un LLM a été entraîné ?",opts:[{t:"Prédire le prochain token d'une séquence",ok:true},{t:"Rechercher la bonne réponse dans une base de données"},{t:"Appliquer des règles de grammaire écrites par des linguistes"},{t:"Traduire les questions en langage machine"}],fb:"Un LLM ne consulte aucune base et ne contient aucune règle écrite à la main : tout découle d'un unique entraînement à prédire la suite d'un texte."},
    {ty:"Vrai/Faux",vf:true,q:"« Un LLM stocke une copie du web et va y chercher ses réponses quand on l'interroge. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"Il a compressé des régularités statistiques dans ses paramètres — au moment de répondre, il ne « consulte » rien. Brancher un LLM sur de vrais documents, ça existe : c'est la RAG (chapitre 4)."},
    {ty:"🔍 Analyse",q:"Une collègue s'amuse : « Cette IA soi-disant géniale n'arrive même pas à dire combien il y a de \"s\" dans \"processus\" ! » L'explication la plus juste ?",opts:[{t:"Le modèle voit des tokens, pas des lettres — compter des lettres lui est structurellement difficile",ok:true},{t:"Le modèle a été mal entraîné sur le français"},{t:"C'est un bug qui sera corrigé dans la prochaine version"},{t:"La question était mal formulée"}],fb:"« processus » arrive au modèle découpé en morceaux numérisés — il n'a jamais « vu » les lettres. Les échecs surprenants d'une IA révèlent souvent comment elle marche."},
    {ty:"Texte à trou",q:"Les API des fournisseurs d'IA se facturent au ___, l'unité de base du texte pour un LLM.",opts:[{t:"token",ok:true},{t:"mot"},{t:"caractère"},{t:"paragraphe"}],fb:"Le token (~un morceau de mot) est l'unité de mesure du domaine — indispensable pour parler coûts avec un client (chapitre 7)."},
    {ty:"🐛 Repère l'erreur",q:"Post LinkedIn fictif : « Les LLM maîtrisent nos langues car [A] leurs concepteurs ont codé la grammaire dans le modèle, et [B] ils ont été entraînés sur d'immenses corpus. » Quelle affirmation est fausse ?",opts:[{t:"L'affirmation A",ok:true},{t:"L'affirmation B"},{t:"Les deux"},{t:"Aucune"}],fb:"Rien n'est codé à la main : la grammaire est apprise, jamais programmée (A est faux, B est vrai). Grand classique des posts LinkedIn — savoir le repérer, c'est déjà de l'évangélisation."},
    {ty:"🎯 Scénario métier",q:"Un directeur de BE : « Si ça ne fait que prédire le mot suivant, ça ne peut pas m'aider à rédiger des exigences techniques. » Ta meilleure réponse :",opts:[{t:"« La prédiction à grande échelle capture structure et style : excellent pour rédiger — mais on relit, car le modèle optimise la plausibilité, pas la vérité »",ok:true},{t:"« Détrompez-vous, les LLM comprennent parfaitement ce qu'ils écrivent »"},{t:"« C'est vrai, les LLM ne servent à rien pour la rédaction technique »"},{t:"« Il faudra attendre la prochaine génération de modèles »"}],fb:"La posture d'évangéliste : ni survendre ni enterrer. Reconnaître la mécanique ET montrer ce qu'elle rend possible, avec le garde-fou qui va bien."}]},
  {id:"l32",title:"Comment on fabrique un LLM",
   obj:["Décrire les 2 grandes étapes de fabrication d'un LLM","Expliquer pourquoi un modèle « brut » ne suffit pas","Répondre à « on peut l'avoir chez nous ? »"],
   fiches:[
    {t:"Le pré-entraînement : lire (presque) tout",h:"<p>Étape 1 : on fait lire au modèle un corpus colossal, pendant des mois, sur des milliers de GPU — c'est là que partent les millions d'euros.</p><p>Le résultat est un <b>modèle de base</b> : brillant pour compléter du texte, mais brut — il ne sait ni converser, ni suivre une consigne.</p><p>C'est le brut de fonderie : toute la matière est là, rien n'est usiné.</p>"},
    {t:"L'affinage : apprendre le métier d'assistant",h:"<p>Étape 2 : on usine. D'abord avec des milliers d'exemples de bons dialogues, puis en faisant <b>noter les réponses par des humains</b> pour que le modèle apprenne à préférer ce que nous préférons (le fameux RLHF).</p><p>C'est un compagnonnage : le savoir vient du pré-entraînement, la manière vient de l'affinage.</p><p>C'est cette étape qui transforme un moteur de complétion en assistant utilisable.</p>"},
    {t:"Poids ouverts, poids fermés",h:"<p>Les milliards de réglages internes appris s'appellent les <b>paramètres</b> (ou poids). Certains éditeurs les publient (modèles « open weights », comme les LLaMA de Meta — oui, comme la mascotte 🦙), d'autres vendent l'accès par API.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Un DSI demande presque toujours : « On peut l'avoir <i>chez nous</i> ? » Oui : un modèle open weights sur ses serveurs — souvent moins puissant que les meilleurs modèles API, mais les données ne sortent jamais. Un arbitrage puissance / maîtrise, pas une question de faisabilité.</div>"}],
   resume:["Étape 1, pré-entraînement : corpus massif → modèle de base brillant mais brut.","Étape 2, affinage + RLHF : exemples et notations humaines lui apprennent le métier d'assistant.","Open weights = déployable chez soi ; API = plus puissant mais externalisé.","Un modèle n'apprend PAS en continu : ses connaissances sont figées à l'entraînement."],
   quiz:[
    {ty:"QCM",q:"Dans quel ordre fabrique-t-on un assistant IA ?",opts:[{t:"Pré-entraînement massif, puis affinage sur dialogues et préférences humaines",ok:true},{t:"Affinage d'abord, pré-entraînement ensuite"},{t:"Une seule étape : on lui apprend directement à converser"},{t:"On programme les réponses, puis on ajoute du vocabulaire"}],fb:"D'abord la culture générale (pré-entraînement), ensuite le métier d'assistant (affinage). Aucune réponse n'est programmée à la main."},
    {ty:"Vrai/Faux",vf:true,q:"« Le RLHF consiste à faire écrire toutes les réponses du modèle par des humains. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"Les humains ne rédigent pas les réponses : ils les NOTENT. Le modèle apprend de ces préférences. Nuance utile face à un client qui croirait qu'« il y a des gens qui répondent derrière »."},
    {ty:"QCM",q:"Si tu interrogeais un modèle de base (sans affinage), à quoi ressemblerait l'échange ?",opts:[{t:"Il continuerait ton texte au lieu de te répondre — plausible mais inutilisable comme assistant",ok:true},{t:"Il répondrait exactement comme ChatGPT"},{t:"Il refuserait de répondre sans licence"},{t:"Il répondrait uniquement en anglais"}],fb:"Un modèle de base complète : posez une question, il peut enchaîner… par trois autres questions du même style. Ça illustre ce que l'affinage apporte : le format conversationnel lui-même."},
    {ty:"Texte à trou",q:"Les milliards de réglages internes qu'un modèle apprend s'appellent les ___.",opts:[{t:"paramètres (ou poids)",ok:true},{t:"tokens"},{t:"prompts"},{t:"algorithmes"}],fb:"« Modèle à 70 milliards de paramètres » = 70 milliards de réglages appris. Token = unité du texte, prompt = consigne — trois termes à ne pas mélanger devant un client."},
    {ty:"🐛 Repère l'erreur",q:"Un commercial : « Notre chatbot GPT apprend en continu de chaque conversation avec vos équipes, il devient chaque jour plus intelligent. » Le problème ?",opts:[{t:"Les connaissances d'un modèle sont figées à l'entraînement — il n'apprend pas de vos conversations",ok:true},{t:"Rien, c'est exact"},{t:"Le problème est légal, pas technique"},{t:"GPT ne peut pas être utilisé en entreprise"}],fb:"Un modèle déployé n'est pas ré-entraîné en continu. Ce qui donne cette impression : la mémoire de session ou l'ajout de contexte — mais le modèle ne change pas. Affirmation marketing à challenger."},
    {ty:"🎯 Scénario métier",q:"Un équipementier défense exige que rien ne sorte de son infrastructure. Ta première piste :",opts:[{t:"Un modèle open weights déployé sur ses propres serveurs",ok:true},{t:"Impossible, l'IA générative nécessite le cloud"},{t:"ChatGPT grand public avec des données anonymisées"},{t:"Attendre une réglementation plus claire"}],fb:"Open weights on-premise = maîtrise totale des données. Moins puissant que les meilleurs modèles API, mais pour la défense c'est souvent le seul chemin acceptable — une vraie réponse, pas un renoncement."}]},
  {id:"l33",title:"Parler à la machine : le prompting",
   obj:["Expliquer pourquoi la qualité de la consigne fait la qualité du résultat","Comprendre la fenêtre de contexte et ses limites","Connaître les 4 réflexes d'un bon prompt"],
   fiches:[
    {t:"Le prompt : un cahier des charges",h:"<p>Le <b>prompt</b>, c'est tout ce que tu donnes au modèle : consigne, contexte, exemples, format attendu. La règle est celle du cahier des charges : <b>spec floue → livrable flou</b>.</p><p>La différence entre une réponse banale et une réponse remarquable vient rarement du modèle — presque toujours de la consigne.</p><p>Bonne nouvelle : exprimer un besoin, c'est ton métier depuis des années.</p>"},
    {t:"La fenêtre de contexte : sa mémoire de travail",h:"<p>Le modèle ne « voit » que ce qui tient dans sa <b>fenêtre de contexte</b> : ta consigne, la conversation en cours, les documents fournis.</p><p>C'est son plan de travail — grand, mais fini, et vidé entre deux sessions : par défaut, il ne se souvient de rien d'hier.</p><p>Tout ce qui n'est pas dans la fenêtre n'existe pas pour lui, aussi important que ce soit pour toi.</p>"},
    {t:"Les 4 réflexes qui changent tout",h:"<p>Un <b>rôle</b> (« Tu es consultant PLM senior… »), du <b>contexte</b> (le client, l'objectif, les contraintes), un ou deux <b>exemples</b> du résultat attendu, et un <b>format de sortie</b> explicite.</p><p>Puis on itère : le premier résultat est un brouillon qu'on affine, pas un verdict.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — La démo qui marque : le même modèle, deux prompts. « Résume ce compte-rendu » → soupe tiède. « Tu es le directeur industriel : ressors les 3 décisions, les 2 risques et qui doit agir avant vendredi, en tableau » → bluffant. Message : <i>l'IA ne remplace pas l'expression de besoin — elle la récompense.</i></div>"}],
   resume:["Le prompt est un cahier des charges : spec floue, livrable flou.","La fenêtre de contexte est la mémoire de travail du modèle — finie, et vide par défaut entre les sessions.","Rôle + contexte + exemples + format attendu : les 4 réflexes d'une bonne consigne.","Itérer est normal : la première réponse est un brouillon, pas un verdict."],
   quiz:[
    {ty:"🎯 QCM scénario",q:"Tu veux une synthèse d'un rapport d'audit qualité pour ton COMEX. Quel prompt donnera le meilleur résultat ?",opts:[{t:"« Tu es directeur qualité. Synthétise ce rapport pour un COMEX : 3 constats majeurs, 2 actions prioritaires, ton neutre, 15 lignes max »",ok:true},{t:"« Résume ce document »"},{t:"« Fais un résumé complet et détaillé de tout le rapport »"},{t:"« Ce rapport est-il bon ? »"}],fb:"Rôle, destinataire, structure, contrainte de longueur : tout y est. « Résume ce document » produira une réponse correcte et générique — la moyenne de ce qu'internet appelle un résumé."},
    {ty:"Vrai/Faux",vf:true,q:"« Par défaut, un assistant IA se souvient de la conversation que vous avez eue avec lui la semaine dernière. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"La fenêtre de contexte se vide entre les sessions. Les fonctions « mémoire » de certains produits sont une couche ajoutée par-dessus (des notes réinjectées), pas une capacité du modèle."},
    {ty:"Texte à trou",q:"Tout ce que le modèle peut prendre en compte à un instant donné doit tenir dans sa fenêtre de ___.",opts:[{t:"contexte",ok:true},{t:"calcul"},{t:"mémoire vive"},{t:"session"}],fb:"C'est elle qui borne la taille des documents analysables d'un coup — et son extension est un argument marketing majeur entre éditeurs."},
    {ty:"QCM",q:"Pourquoi donner un ou deux exemples du résultat attendu améliore-t-il autant la réponse ?",opts:[{t:"Le modèle imite le motif fourni — la prédiction s'aligne sur la forme démontrée",ok:true},{t:"Les exemples ré-entraînent le modèle définitivement"},{t:"Ça augmente la taille de la fenêtre de contexte"},{t:"C'est un mythe, les exemples ne changent rien"}],fb:"C'est le « few-shot » : montrer vaut mieux que décrire, car le modèle est une machine à continuer les motifs. Rien n'est ré-entraîné — l'effet dure le temps de la conversation."},
    {ty:"🐛 Repère l'erreur",q:"Un collègue : « J'ai tapé ma question, la réponse était moyenne. Cette IA est nulle, je passe à autre chose. » L'erreur de méthode ?",opts:[{t:"Juger l'outil sur un premier jet sans consigne travaillée ni itération",ok:true},{t:"Il aurait dû tester en anglais"},{t:"Il aurait dû utiliser un modèle plus gros"},{t:"Aucune erreur : un bon outil doit être bon du premier coup"}],fb:"L'erreur n°1 des déçus de l'IA. Un premier jet sur une question sèche mesure la consigne, pas l'outil. « Exprimer son besoin, puis itérer » fait tout l'écart entre utilisateurs."},
    {ty:"🎯 Scénario métier",q:"En atelier client, l'assistant IA répond des généralités sur leurs processus de conception. Ta meilleure action immédiate :",opts:[{t:"Enrichir le prompt avec leur contexte : secteur, outils, vocabulaire maison, exemple concret",ok:true},{t:"Conclure que l'IA n'est pas prête pour leur métier"},{t:"Changer de fournisseur de modèle"},{t:"Reformuler la même question plus poliment"}],fb:"Généralité en sortie = manque de spécifique en entrée. Et quand le contexte à fournir devient trop gros pour un prompt, la bonne réponse s'appelle la RAG (chapitre 4)."}]},
  {id:"l34",title:"Les hallucinations",
   obj:["Expliquer ce qu'est une hallucination et pourquoi elle est structurelle","Connaître les 3 parades concrètes","Cadrer le risque face à un client échaudé"],
   fiches:[
    {t:"Plausible n'est pas vrai",h:"<p>Un LLM optimise une chose : la <b>vraisemblance</b> de la suite du texte. Quand il sait, le plus plausible est souvent le vrai ; quand il ne sait pas, il produit quand même la suite la plus plausible — fluide, assurée, et fausse.</p><p>C'est l'<b>hallucination</b> : une invention livrée avec l'aplomb d'une certitude.</p><p>Le danger n'est pas que le modèle se trompe — c'est qu'il se trompe sans jamais changer de ton.</p>"},
    {t:"Pourquoi on ne « corrige » pas ça",h:"<p>On ne peut pas patcher l'hallucination comme un bug : c'est le <b>même mécanisme</b> qui produit la fluidité ET l'invention.</p><p>Les éditeurs la <b>réduisent</b> (meilleures données, alignement, capacité à dire « je ne sais pas ») mais aucun modèle du marché n'est à zéro.</p><p>Toute promesse de « zéro hallucination » est un signal d'alarme, pas un argument.</p>"},
    {t:"Les trois parades",h:"<p><b>Un</b> : ancrer le modèle sur des documents de référence — il cite au lieu d'inventer (c'est la RAG, chapitre 4). <b>Deux</b> : exiger les sources et vérifier ce qui engage. <b>Trois</b> : garder l'humain dans la boucle partout où l'erreur coûte cher.</p><div class='encart'><b>🏗️ Dans une vraie situation</b> — Un DSI échaudé : « Votre IA invente — on ne peut pas lui faire confiance. » Réponse : « Vous avez raison, et c'est structurel. La question n'est donc pas <i>confiance oui/non</i>, mais <i>quel usage pour quel niveau de risque</i> : brouillon relu par un expert → oui ; réponse automatique engageante → avec garde-fous. » Cadrer le risque, c'est ça, la crédibilité.</div>"}],
   resume:["Halluciner = produire du plausible faux, avec l'aplomb du vrai — conséquence directe du principe de prédiction.","Pas un bug corrigible : les éditeurs réduisent, personne n'élimine. « Zéro hallucination » = signal d'alarme.","Parades : ancrage sur documents (RAG), exigence de sources, humain dans la boucle selon la criticité.","La bonne question client : quel usage pour quel niveau de risque."],
   quiz:[
    {ty:"QCM",q:"Quelle définition d'une hallucination est la plus juste ?",opts:[{t:"Une réponse plausible et affirmée, mais factuellement fausse",ok:true},{t:"Un plantage du serveur du modèle"},{t:"Une réponse volontairement trompeuse"},{t:"Une réponse hors sujet mais vraie"}],fb:"Ni panne ni mensonge (pas d'intention) : une invention statistiquement cohérente. C'est l'aplomb du ton qui la rend dangereuse."},
    {ty:"Vrai/Faux",vf:true,q:"« L'hallucination est un défaut de jeunesse qui sera totalement éliminé par les prochaines versions de modèles. »",opts:[{t:"Vrai"},{t:"Faux",ok:true}],fb:"Elle est inhérente au mécanisme de prédiction. Les taux baissent génération après génération, mais viser zéro par le seul modèle n'est pas réaliste — d'où les parades d'architecture et de process."},
    {ty:"🔍 Analyse",q:"L'assistant d'un ingénieur méthodes cite « la directive machine 2006/42/CE, article 12.4 » — l'article n'existe pas. Pourquoi la citation était-elle si convaincante ?",opts:[{t:"Le modèle a reproduit le format exact d'une vraie référence — la forme est apprise, le contenu est inventé",ok:true},{t:"Le modèle a piraté une base réglementaire obsolète"},{t:"L'ingénieur a mal recopié la référence"},{t:"Les textes réglementaires sont absents des données d'entraînement"}],fb:"Le modèle excelle à reproduire la FORME (numérotation, style juridique) même quand le fond est inventé. Plus le domaine a un formalisme fort, plus le faux ressemble au vrai."},
    {ty:"QCM",q:"Pour un assistant qui répond sur la documentation interne d'une entreprise, quelle mesure réduit le plus les hallucinations ?",opts:[{t:"L'ancrer sur les documents de référence pour qu'il cite au lieu d'inventer (RAG)",ok:true},{t:"Lui demander poliment de ne pas se tromper"},{t:"Augmenter la taille du modèle"},{t:"Le faire répondre plus lentement"}],fb:"Ancrer le modèle change la nature de l'exercice : de « réciter de mémoire » à « répondre les documents sous les yeux ». C'est LE sujet du chapitre 4."},
    {ty:"🐛 Repère l'erreur",q:"Sur un salon, un éditeur affiche : « Grâce à notre fine-tuning propriétaire, notre IA n'hallucine jamais. » Ta lecture :",opts:[{t:"Promesse invérifiable et structurellement fausse — à challenger avec un taux mesuré et un protocole d'évaluation",ok:true},{t:"Crédible si l'éditeur est un grand nom"},{t:"Vrai si le modèle est entraîné sur les données du client"},{t:"Impossible à évaluer, donc sans importance"}],fb:"« Jamais » est le mot qui trahit. La réponse pro : demander le taux d'erreur mesuré, sur quel jeu de test, avec quel protocole. Un éditeur sérieux a ces chiffres."},
    {ty:"🎯 Scénario métier",q:"MécaNova veut prioriser ses premiers usages IA. Lequel présente le meilleur rapport valeur/risque au démarrage ?",opts:[{t:"Générer des brouillons de comptes-rendus d'essais, systématiquement relus par l'ingénieur responsable",ok:true},{t:"Répondre automatiquement aux questions réglementaires des clients, sans relecture"},{t:"Valider seul la conformité des dossiers avant livraison"},{t:"Rédiger les notices de sécurité publiées sans contrôle"}],fb:"La grille : criticité de l'erreur × présence d'un humain. Brouillon + relecture experte = combo idéal pour démarrer. Les trois autres mettent une réponse non vérifiée face à un enjeu réglementaire ou de sécurité."}]},
  {id:"l35",title:"Au-delà du texte : le multimodal",
   obj:["Expliquer ce que « multimodal » veut dire concrètement","Citer 3 usages industriels crédibles","Poser les bonnes questions devant une démo spectaculaire"],
   fiches:[
    {t:"Tout devient token",h:"<p>Un modèle <b>multimodal</b> traite images, audio ou vidéo en plus du texte : tout est converti dans le même espace de représentation interne, comme le texte l'est en tokens.</p><p>Tu montres une photo, il la décrit ; tu parles, il transcrit et répond ; tu demandes un schéma, il le génère.</p><p>Le texte n'est plus la seule porte d'entrée — c'est un changement d'interface autant que de capacité.</p>"},

<script>
/* ================= ÉTAT & SAUVEGARDE (format versionné SHP1-) ================= */
const LS_KEY="sherpia";
const SAVE_PREFIX="SHP", SAVE_VERSION=1;
let state=loadState();

function defaultState(){return {v:SAVE_VERSION,best:{},tp:{}};}
function loadState(){
  try{const raw=localStorage.getItem(LS_KEY);if(!raw)return defaultState();
    return migrate(JSON.parse(raw));}catch(e){return defaultState();}
}
function migrate(s){ /* migration explicite à la lecture — leçon Cortex §3 */
  if(!s||typeof s!=="object")return defaultState();
  if(!s.v)s.v=1;
  // v1 : format initial. Les futures versions ajouteront leurs migrations ici, en cascade.
  s.best=s.best||{};s.tp=s.tp||{};
  s.v=SAVE_VERSION;
  return s;
}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}
function checksum(str){let n=0;for(let i=0;i<str.length;i++)n=(n+str.charCodeAt(i)*(i%7+1))%1296;
  return n.toString(36).padStart(2,"0").toUpperCase();}
function exportCode(){
  const b64=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
  return SAVE_PREFIX+SAVE_VERSION+"-"+b64+"-"+checksum(b64);
}
function importCode(code){
  const m=(code||"").trim().match(/^SHP(\d+)-([A-Za-z0-9+/=]+)-([A-Z0-9]{2})$/);
  if(!m)return {err:"Format non reconnu. Un code SherpIA ressemble à SHP1-…-XX"};
  if(checksum(m[2])!==m[3])return {err:"Code corrompu (somme de contrôle invalide). Vérifie le copier-coller."};
  try{
    const data=migrate(JSON.parse(decodeURIComponent(escape(atob(m[2])))));
    state=data;save();return {ok:true};
  }catch(e){return {err:"Code illisible. Vérifie le copier-coller."}}
}

/* ================= CALCULS (tout dynamique — leçon PyQuest §5) ================= */
function passNeeded(n){return Math.ceil(n*0.6);}
function lessonXP(ch,l){const b=state.best[l.id];if(b==null)return 0;
  return b*10+(b===l.quiz.length?15:0);}
function lessonMaxXP(l){return l.quiz.length*10+15;}
function tpXP(tp){const b=state.tp[tp.id];if(b==null)return 0;
  return b*10+(b===tp.steps.length?20:0);}
function tpMaxXP(tp){return tp.steps.length*10+20;}
function totalXP(){let x=0;
  CHAPTERS.forEach(c=>{(c.lessons||[]).forEach(l=>x+=lessonXP(c,l));if(c.tp)x+=tpXP(c.tp);});
  return x;}
function maxAvailableXP(){let x=0;
  CHAPTERS.forEach(c=>{if(c.soon)return;(c.lessons||[]).forEach(l=>x+=lessonMaxXP(l));if(c.tp)x+=tpMaxXP(c.tp);});
  return x;}
function stars(score,n){if(score==null)return 0;if(score>=n)return 3;if(score>=n-1)return 2;
  return score>=passNeeded(n)?1:0;}
function starStr(k){return k?"★".repeat(k)+"☆".repeat(3-k):"";}
function lessonPassed(l){return (state.best[l.id]||0)>=passNeeded(l.quiz.length);}
function lessonUnlocked(ch,i){
  if(i===0)return true;
  if(state.best[ch.lessons[i].id]!=null)return true; /* règle tolérante — leçon PyQuest §5 */
  return lessonPassed(ch.lessons[i-1]);
}
function tpUnlocked(ch){return ch.lessons.every(lessonPassed);}
function chapterAgg(ch){
  const n=ch.lessons.length;let done=0,good=0,total=0;
  ch.lessons.forEach(l=>{if(lessonPassed(l))done++;good+=state.best[l.id]||0;total+=l.quiz.length;});
  return {done,n,good,total,tpDone:state.tp[ch.tp.id]!=null};
}
function currentRank(){const xp=totalXP();let r=RANKS[0],idx=0;
  RANKS.forEach((k,i)=>{if(xp>=k.t){r=k;idx=i;}});
  return {r,idx,xp};}

/* ================= NAVIGATION (pushState — geste retour Android, leçon PyQuest §4) ================= */
const app=$("#app");
function go(view,params,replace){
  const st=Object.assign({view},params||{});
  if(replace)history.replaceState(st,"");else history.pushState(st,"");
  render(st);
}
window.addEventListener("popstate",e=>{render(e.state||{view:"home"});});
function render(st){
  window.scrollTo(0,0);
  if(st.view==="chapter")return renderChapter(st.ch);
  if(st.view==="lesson")return renderLesson(st.ch,st.lesson);
  if(st.view==="tp")return renderTP(st.ch);
  if(st.view==="ranks")return renderRanks();
  renderHome();
}

/* ================= VUES ================= */
function header(){
  const {r,idx,xp}=currentRank();
  const next=RANKS[idx+1];
  const pct=next?Math.min(100,Math.round((xp-r.t)/(next.t-r.t)*100)):100;
  return `<div class="hdr">
    <div class="hdr-row"><span class="lama">🦙</span>
      <div class="t"><b>SherpIA</b><small>Ton guide vers les sommets de l'IA</small></div></div>
    <div class="hdr-stats">
      <button class="pill" id="p-rank">${r.e} ${r.n}</button>
      <span class="pill">⚡ ${xp} XP</span>
      <button class="pill" id="p-save">💾 Sauvegarde</button>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    ${next?`<small style="color:#d5ccf5;font-size:12px;display:block;margin-top:6px">${next.t-xp} XP avant « ${next.e} ${next.n} »</small>`:""}
  </div>`;
}
function renderHome(){
  let cards="";
  CHAPTERS.forEach(c=>{
    if(c.soon){
      cards+=`<div class="card chap soon" data-soon="${c.id}"><div class="ic">${c.e}</div>
        <div class="inf"><b>Ch.${c.num} · ${c.title}</b><small>${c.teaser}</small></div>
        <span class="lock-ic">🔒</span></div>`;
    }else{
      const a=chapterAgg(c);
      cards+=`<div class="card chap" data-ch="${c.id}"><div class="ic">${c.e}</div>
        <div class="inf"><b>Ch.${c.num} · ${c.title}</b>
        <small>${a.done}/${a.n} leçons réussies · ${a.good}/${a.total} bonnes réponses${a.tpDone?" · TP ✔":""}</small>
        <div class="minibar"><i style="width:${Math.round(a.good/a.total*100)}%"></i></div></div>
        <span class="chev">›</span></div>`;
    }
  });
  app.innerHTML=header()+
    `<div class="section-t">L'expédition</div>`+cards+
    `<p style="color:var(--muted);font-size:13.5px;text-align:center;margin-top:18px">
      Les prochains chapitres arriveront par mises à jour —<br>ta progression sera conservée grâce à ton code 💾.</p>`;
  bindHeader();
  document.querySelectorAll("[data-ch]").forEach(n=>n.onclick=()=>go("chapter",{ch:n.dataset.ch}));
}
function bindHeader(){
  $("#p-rank").onclick=()=>go("ranks");
  $("#p-save").onclick=openSaveModal;
}
function renderChapter(chId){
  const c=CHAPTERS.find(x=>x.id===chId);
  let rows="";
  c.lessons.forEach((l,i)=>{
    const unlocked=lessonUnlocked(c,i);
    const st=stars(state.best[l.id],l.quiz.length);
    rows+=`<div class="card lesson ${unlocked?"":"locked"}" ${unlocked?`data-play="${i}"`:""}>
      <div class="num">${i+1}</div>
      <div class="inf"><b>Leçon ${i+1} - ${l.title}</b>
        <span class="stars">${state.best[l.id]!=null?starStr(st)+" · "+state.best[l.id]+"/"+l.quiz.length:(unlocked?"non jouée":"🔒 réussis la leçon précédente")}</span></div>
      <button class="info-btn" data-info="${i}">i</button>
      ${unlocked?'<span class="chev">›</span>':'<span class="lock-ic">🔒</span>'}
    </div>`;
  });
  const tpOk=tpUnlocked(c);const tpB=state.tp[c.tp.id];
  rows+=`<div class="section-t">Synthèse</div>
    <div class="card lesson ${tpOk?"":"locked"}" ${tpOk?`data-tp="1"`:""}>
      <div class="num">🏗️</div>
      <div class="inf"><b>Synthèse - ${c.tp.title}</b>
        <span class="stars">${tpB!=null?tpB+"/"+c.tp.steps.length+" bons choix":(tpOk?"Scénario MécaNova":"🔒 réussis toutes les leçons")}</span></div>
      ${tpOk?'<span class="chev">›</span>':'<span class="lock-ic">🔒</span>'}
    </div>`;
  app.innerHTML=`<button class="back" id="bk">← Accueil</button>
    <h2 style="margin:6px 0 2px">${c.e} Chapitre ${c.num} — ${c.title}</h2>
    <p style="color:var(--muted);font-size:14.5px;margin-top:4px">${c.teaser}</p>`+rows;
  $("#bk").onclick=()=>history.back();
  document.querySelectorAll("[data-play]").forEach(n=>n.onclick=()=>go("lesson",{ch:c.id,lesson:+n.dataset.play}));
  document.querySelectorAll("[data-info]").forEach(n=>n.onclick=(e)=>{e.stopPropagation();openLessonInfo(c,+n.dataset.info);});
  const tpRow=$("[data-tp]");if(tpRow)tpRow.onclick=()=>go("tp",{ch:c.id});
}
function openLessonInfo(c,i){
  const l=c.lessons[i];const unlocked=lessonUnlocked(c,i);
  openModal(`<h3>Leçon ${i+1} - ${l.title}</h3>
    <p class="muted" style="margin:4px 0 10px">À la fin tu sauras :</p>
    <ul class="obj-list">${l.obj.map(o=>`<li>${o}</li>`).join("")}</ul>
    <p class="muted">${l.fiches.length} fiches + résumé · quiz de ${l.quiz.length} questions · jusqu'à ${lessonMaxXP(l)} XP</p>
    ${unlocked?`<button class="btn" id="m-start">C'est parti 🦙</button>`:`<p class="muted">🔒 Réussis d'abord la leçon précédente (≥ ${passNeeded(l.quiz.length)}/${l.quiz.length}).</p>`}`);
  const b=$("#m-start");if(b)b.onclick=()=>{closeModal();go("lesson",{ch:c.id,lesson:i});};
}

/* ---------- Leçon : fiches (swipe) puis quiz ---------- */
function renderLesson(chId,li){
  const c=CHAPTERS.find(x=>x.id===chId);const l=c.lessons[li];
  const cards=l.fiches.map(f=>({t:f.t,h:f.h}))
    .concat([{t:"📌 En résumé",h:"<ul>"+l.resume.map(r=>`<li>${r}</li>`).join("")+"</ul>"}]);
  let idx=0;
  function paint(dir){
    const f=cards[idx];
    app.innerHTML=`<button class="back" id="bk">← ${c.e} Chapitre ${c.num}</button>
      <h2 style="margin:6px 0 0;font-size:19px">Leçon ${li+1} - ${l.title}</h2>
      <div class="fiche-wrap" id="fw">
        <div class="fiche" id="fc"><h3>${f.t}</h3>${f.h}</div>
      </div>
      <div class="dots">${cards.map((_,k)=>`<i class="${k===idx?"on":""}"></i>`).join("")}</div>
      <button class="btn" id="nx">${idx<cards.length-1?"Fiche suivante →":"Passer au quiz 🎯"}</button>`;
    $("#bk").onclick=()=>history.back();
    const fc=$("#fc");
    if(dir){fc.style.animation=`slide-${dir} .28s ease`;}
    $("#nx").onclick=()=>{if(idx<cards.length-1){idx++;paint("l");}else startQuiz();};
    attachSwipe($("#fw"),fc,
      ()=>{if(idx<cards.length-1){idx++;paint("l");}else startQuiz();},
      ()=>{if(idx>0){idx--;paint("r");}});
  }
  function startQuiz(){runQuiz(c,l,li);}
  paint();
}
const styleExtra=document.createElement("style");
styleExtra.textContent=`@keyframes slide-l{from{transform:translateX(60px);opacity:.2}to{transform:none;opacity:1}}
@keyframes slide-r{from{transform:translateX(-60px);opacity:.2}to{transform:none;opacity:1}}`;
document.head.appendChild(styleExtra);

function attachSwipe(wrap,card,onNext,onPrev){
  let x0=null,dx=0,skip=false;
  wrap.addEventListener("touchstart",e=>{
    /* jamais de swipe si le geste démarre sur un élément scrollable — leçon PyQuest §4 */
    skip=!!e.target.closest("pre,table,code");
    x0=e.touches[0].clientX;dx=0;card.style.transition="none";
  },{passive:true});
  wrap.addEventListener("touchmove",e=>{
    if(x0==null||skip)return;
    dx=e.touches[0].clientX-x0;
    card.style.transform=`translateX(${dx*0.85}px)`;card.style.opacity=String(Math.max(.4,1-Math.abs(dx)/420));
  },{passive:true});
  wrap.addEventListener("touchend",()=>{
    if(x0==null||skip){x0=null;return;}
    card.style.transition="transform .2s,opacity .2s";
    if(dx<-70)onNext();else if(dx>70)onPrev();
    else{card.style.transform="";card.style.opacity="";} /* retour élastique */
    x0=null;
  });
}

function vfIcon(q,o){
  if(!q.vf)return "";
  const t=o.t.trim();
  if(t==="Vrai")return '<span class="vf-ico">✅</span>';
  if(t==="Faux")return '<span class="vf-ico">❌</span>';
  return "";
}
function runQuiz(c,l,li){
  let qi=0,score=0;
  function paintQ(){
    const q=l.quiz[qi];
    const opts=q.vf?q.opts:shuffle(q.opts); /* Fisher-Yates partagé ; V/F jamais mélangé */
    app.innerHTML=`<button class="back" id="bk">← ${c.e} Chapitre ${c.num}</button>
      <div class="qhead"><span>Question ${qi+1}/${l.quiz.length}</span><span class="qtype">${q.ty}</span></div>
      <div class="quiz-frame">
        <div class="qtext">${q.q}</div>
        <div class="opts-card" id="opts">${opts.map((o,k)=>`<button class="opt" data-k="${k}">${vfIcon(q,o)}<span>${o.t}</span></button>`).join("")}</div>
      </div>
      <div id="fbz"></div>`;
    $("#bk").onclick=()=>history.back();
    document.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const chosen=opts[+btn.dataset.k];const good=!!chosen.ok;
        if(good)score++;
        document.querySelectorAll(".opt").forEach((b2,k2)=>{
          b2.disabled=true;
          if(opts[k2].ok)b2.classList.add("ok");
          else if(b2===btn)b2.classList.add("ko");
          else b2.classList.add("dim");
        });
        $("#fbz").innerHTML=`<div class="fb ${good?"good":"bad"}"><b>${good?"✔ Bien vu !":"✘ Pas celle-là."}</b>💬 ${q.fb}</div>
          <button class="btn" id="cont">${qi<l.quiz.length-1?"Question suivante →":"Voir le résultat 🏁"}</button>`;
        $("#cont").onclick=()=>{if(qi<l.quiz.length-1){qi++;paintQ();}else finish();};
      };
    });
  }
  function finish(){
    const n=l.quiz.length;
    const prevBest=state.best[l.id];
    const improved=prevBest==null||score>prevBest;
    const before=totalXP();
    if(improved){state.best[l.id]=score;save();}
    const gained=totalXP()-before;
    const st=stars(state.best[l.id],n);
    const passed=score>=passNeeded(n);
    app.innerHTML=`<div class="result">
      <div class="big">${passed?(score===n?"🦙✨":"🦙"):"🦙💤"}</div>
      <h2>${passed?(score===n?"Sans faute !":"Leçon réussie !"):"Presque…"}</h2>
      <div class="stars">${starStr(st)||"☆☆☆"}</div>
      <p>${score}/${n} bonnes réponses${prevBest!=null&&!improved?` · record : ${prevBest}/${n}`:""}</p>
      <p class="xp">${gained>0?`+${gained} XP ⚡`:"Pas de nouveau record — l'XP reste acquis sur tes meilleurs scores"}</p>
      ${passed?"":`<p style="color:var(--muted);font-size:14px">Il faut ${passNeeded(n)}/${n} pour débloquer la suite. Les fiches sont relisibles avant de retenter !</p>`}
    </div>
    <button class="btn" id="r1">${passed?"Continuer l'expédition →":"Relire les fiches"}</button>
    <button class="btn ghost" id="r2">${passed?"Rejouer cette leçon":"Retenter le quiz"}</button>`;
    $("#r1").onclick=()=>{if(passed)history.back();else go("lesson",{ch:c.id,lesson:li},true);};
    $("#r2").onclick=()=>{if(passed)go("lesson",{ch:c.id,lesson:li},true);else{qi=0;score=0;paintQ();}};
  }
  paintQ();
}

/* ---------- TP ---------- */
function renderTP(chId){
  const c=CHAPTERS.find(x=>x.id===chId);const tp=c.tp;
  let si=-1,correct=0;
  function paintIntro(){
    app.innerHTML=`<button class="back" id="bk">← ${c.e} Chapitre ${c.num}</button>
      <h2 style="margin:6px 0 2px">🏗️ Synthèse - ${tp.title}</h2>
      <div class="card" style="font-size:15.5px">${tp.intro}</div>
      <button class="btn" id="go">Entrer en réunion 🎬</button>`;
    $("#bk").onclick=()=>history.back();
    $("#go").onclick=()=>{si=0;paintStep();};
  }
  function paintStep(){
    const s=tp.steps[si];
    const opts=shuffle(s.opts);
    app.innerHTML=`<button class="back" id="bk">← ${c.e} Chapitre ${c.num}</button>
      <div class="tp-step">${s.label} · ${si+1}/${tp.steps.length}</div>
      <div class="quiz-frame">
        <div class="qtext">${s.q}</div>
        <div class="opts-card">${opts.map((o,k)=>`<button class="opt" data-k="${k}"><span>${o.t}</span></button>`).join("")}</div>
      </div>
      <div id="fbz"></div>`;
    $("#bk").onclick=()=>history.back();
    document.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick=()=>{
        const chosen=opts[+btn.dataset.k];const good=!!chosen.ok;
        if(good)correct++;
        document.querySelectorAll(".opt").forEach((b2,k2)=>{
          b2.disabled=true;
          if(opts[k2].ok)b2.classList.add("ok");
          else if(b2===btn)b2.classList.add("ko");
          else b2.classList.add("dim");
        });
        $("#fbz").innerHTML=`<div class="fb ${good?"good":"bad"}"><b>${good?"✔ Le bon réflexe.":"✘ Pas le meilleur choix."}</b>💬 ${chosen.fb}${!good?`<br><br><i>Le bon choix : « ${s.opts.find(o=>o.ok).t} » — ${s.opts.find(o=>o.ok).fb}</i>`:""}</div>
          <button class="btn" id="cont">${si<tp.steps.length-1?"Étape suivante →":"Conclure la mission 🏁"}</button>`;
        $("#cont").onclick=()=>{if(si<tp.steps.length-1){si++;paintStep();}else finish();};
      };
    });
  }
  function finish(){
    const n=tp.steps.length;
    const prevBest=state.tp[tp.id];
    const improved=prevBest==null||correct>prevBest;
    const before=totalXP();
    if(improved){state.tp[tp.id]=correct;save();}
    const gained=totalXP()-before;
    const agg=chapterAgg(c);const chapterDone=agg.done===agg.n;
    app.innerHTML=`<div class="result">
      <div class="big">${correct===n?"🦙🏆":"🦙"}</div>
      <h2>${correct===n?"Mission parfaite !":"Mission accomplie"}</h2>
      <p>${correct}/${n} bons choix face à MécaNova</p>
      <p class="xp">${gained>0?`+${gained} XP ⚡`:"Record déjà atteint"}</p>
    </div>
    <div class="post-draft">${tp.post}</div>
    ${chapterDone?`<div class="hint-export">💾 <b>Chapitre terminé — pense à ton code de sauvegarde !</b><br>
      Un nettoyage du navigateur peut effacer ta progression locale. Exporte ton code maintenant, ça prend 5 secondes.
      <button class="btn sec" id="exp" style="margin-top:10px">Exporter mon code</button></div>`:""}
    <button class="btn" id="r1">Retour au chapitre</button>`;
    const ex=$("#exp");if(ex)ex.onclick=openSaveModal;
    $("#r1").onclick=()=>history.back();
  }
  paintIntro();
}

/* ---------- Frise des rangs ---------- */
function renderRanks(){
  const {r,idx,xp}=currentRank();
  const maxAvail=maxAvailableXP();
  let rows="";
  RANKS.forEach((k,i)=>{
    const here=i===idx;
    const locked=k.t>maxAvail;
    rows+=`<div class="rank-item ${here?"here":""} ${locked?"locked":""}">
      <div class="re">${k.e}</div>
      <div class="ri"><b>${k.n} ${here?'<span class="here-tag">◀ tu es ici</span>':""}</b>
      <small>${k.d}</small>
      <small>${k.t} XP${locked?" · 🔒 avec les prochains chapitres":(i>idx?` · encore ${k.t-xp} XP`:"")}</small></div>
    </div>`;
  });
  app.innerHTML=`<button class="back" id="bk">← Accueil</button>
    <h2 style="margin:6px 0 14px">L'ascension du lama</h2>${rows}
    <p style="color:var(--muted);font-size:13px">La frise est calibrée sur l'expédition complète (8 chapitres). XP actuel : ${xp}.</p>`;
  $("#bk").onclick=()=>history.back();
}

/* ---------- Modales & sauvegarde ---------- */
function openModal(html){
  closeModal();
  const bg=el(`<div class="modal-bg" id="modal-bg"><div class="modal">${html}</div></div>`);
  bg.addEventListener("click",e=>{if(e.target===bg)closeModal();});
  document.body.appendChild(bg);
}
function closeModal(){const m=$("#modal-bg");if(m)m.remove();}
function toast(msg){
  const t=el(`<div class="toast">${msg}</div>`);document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}
function openSaveModal(){
  openModal(`<h3>💾 Code de sauvegarde</h3>
    <p class="muted">Copie ce code et garde-le (notes, mail…). Il restaure ta progression après un changement de téléphone, un nettoyage du navigateur ou une mise à jour de l'app.</p>
    <textarea id="exp-code" readonly>${exportCode()}</textarea>
    <button class="btn sec" id="copy">📋 Copier le code</button>
    <h3 style="margin-top:20px">Importer un code</h3>
    <textarea id="imp-code" placeholder="Colle ton code SHP1-… ici"></textarea>
    <button class="btn" id="imp">Restaurer cette progression</button>`);
  $("#copy").onclick=async()=>{
    const c=$("#exp-code").value;
    try{await navigator.clipboard.writeText(c);}catch(e){$("#exp-code").select();document.execCommand("copy");}
    toast("Code copié ✔");
  };
  $("#imp").onclick=()=>{
    const res=importCode($("#imp-code").value);
    if(res.err){toast("⚠️ "+res.err);return;}
    closeModal();toast("Progression restaurée 🦙");go("home",{},true);
  };
}

/* ---------- Démarrage ---------- */
if("serviceWorker" in navigator&&location.protocol!=="file:"){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
window.__SHERPIA={CHAPTERS,RANKS,get state(){return state;},exportCode,importCode,shuffle,totalXP,maxAvailableXP};
go("home",{},true);
</script>
